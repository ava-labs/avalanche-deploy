[validators]
validator-1 ansible_host=127.0.0.1 ansible_connection=local ansible_user=ubuntu node_type=validator private_ip=127.0.0.1

[rpc_archive]
rpc-archive-1 ansible_host=127.0.0.1 ansible_connection=local ansible_user=ubuntu node_type=rpc rpc_type=archive private_ip=127.0.0.1

[rpc_pruned]
rpc-pruned-1 ansible_host=127.0.0.1 ansible_connection=local ansible_user=ubuntu node_type=rpc rpc_type=pruned private_ip=127.0.0.1

[rpc:children]
rpc_archive
rpc_pruned

[primary_validators]
primary-validator-1 ansible_host=127.0.0.1 ansible_connection=local ansible_user=ubuntu node_type=primary-validator private_ip=127.0.0.1

[monitoring]
monitoring-1 ansible_host=127.0.0.1 ansible_connection=local ansible_user=ubuntu private_ip=127.0.0.1

[all_validators:children]
validators
primary_validators

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
