apiVersion: apps/v1
kind: Deployment
metadata:
  name: avalanche-rpc
  namespace: avalanche
spec:
  replicas: 2
  selector:
    matchLabels:
      app: avalanche-rpc
  template:
    metadata:
      labels:
        app: avalanche-rpc
    spec:
      containers:
        - name: avalanchego
          image: avaplatform/avalanchego:v1.14.1
          args:
            - --network-id=5
            - --http-host=0.0.0.0
            - --http-port=9650
            - --staking-port=9651
            - --log-level=info
            - --index-enabled=true
            - --db-dir=/data/db
            - --plugin-dir=/plugins
          ports:
            - containerPort: 9650
              name: http
            - containerPort: 9651
              name: staking
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/avalanchego
          livenessProbe:
            httpGet:
              path: /ext/health
              port: 9650
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ext/health
              port: 9650
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "16Gi"
      volumes:
        - name: data
          emptyDir: {}
        - name: config
          configMap:
            name: avalanche-config
---
apiVersion: v1
kind: Service
metadata:
  name: avalanche-rpc
  namespace: avalanche
spec:
  type: LoadBalancer
  selector:
    app: avalanche-rpc
  ports:
    - port: 9650
      name: http
    - port: 9651
      name: staking
