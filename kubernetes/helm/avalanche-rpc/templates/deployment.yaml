apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "l1-rpc.fullname" . }}
  labels:
    {{- include "l1-rpc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.l1_rpc_replicas }}
  selector:
    matchLabels:
      {{- include "l1-rpc.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "l1-rpc.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.l1_rpc_affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.l1_rpc_nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.l1_rpc_tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "l1-rpc.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.l1_rpc_securityContext | nindent 8 }}
      containers:
        - name: avalanchego
          image: "{{ .Values.l1_rpc_image.repository }}:{{ .Values.l1_rpc_image.tag }}"
          imagePullPolicy: {{ .Values.l1_rpc_image.pullPolicy }}
          env:
            - name: HOME
              value: /data
          command:
            - /avalanchego/build/avalanchego
          args:
            - --network-id={{ include "l1-rpc.networkId" . }}
            - --http-host=0.0.0.0
            - --http-port={{ .Values.l1_rpc_config.httpPort }}
            - --staking-port={{ .Values.l1_rpc_config.stakingPort }}
            - --log-level={{ .Values.l1_rpc_config.logLevel }}
            - --api-admin-enabled={{ .Values.l1_rpc_config.apiAdminEnabled }}
            - --api-info-enabled={{ .Values.l1_rpc_config.apiInfoEnabled }}
            - --api-health-enabled={{ .Values.l1_rpc_config.apiHealthEnabled }}
            - --index-enabled={{ .Values.l1_rpc_config.indexEnabled }}
            - --db-dir=/data/db
            - --plugin-dir=/avalanchego/build/plugins
            # Partial sync for L1 - only sync P-Chain from Primary Network
            {{- if .Values.l1_rpc_config.partialSyncPrimaryNetwork }}
            - --partial-sync-primary-network={{ .Values.l1_rpc_config.partialSyncPrimaryNetwork }}
            {{- end }}
            {{- if .Values.l1.enabled }}
            - --track-subnets={{ .Values.l1.subnetId }}
            {{- if .Values.l1.bootstrapIds }}
            - --bootstrap-ids={{ .Values.l1.bootstrapIds }}
            - --bootstrap-ips={{ .Values.l1.bootstrapIps }}
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.l1_rpc_config.httpPort }}
              protocol: TCP
            - name: staking
              containerPort: {{ .Values.l1_rpc_config.stakingPort }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.l1_rpc_livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.l1_rpc_readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.l1_rpc_resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.l1_rpc_persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "l1-rpc.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
