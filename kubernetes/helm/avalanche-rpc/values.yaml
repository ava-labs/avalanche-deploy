# Default values for avalanche-rpc

replicaCount: 2

network: fuji

image:
  # Uses bundled image with avalanchego + subnet-evm
  # Tag format: v{avalanchego}-v{subnet-evm}
  repository: avaplatform/subnet-evm_avalanchego
  tag: "v1.14.1-v0.8.0"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: "2"
    memory: "8Gi"
  limits:
    cpu: "4"
    memory: "16Gi"

persistence:
  enabled: true
  storageClass: ""
  size: 500Gi
  accessModes:
    - ReadWriteOnce

config:
  httpPort: 9650
  stakingPort: 9651
  logLevel: info
  apiAdminEnabled: false
  apiInfoEnabled: true
  apiHealthEnabled: true
  indexEnabled: true  # Enable indexing for RPC queries

service:
  type: LoadBalancer
  httpPort: 9650
  stakingPort: 9651

# Horizontal pod autoscaler
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: avalanche-rpc
          topologyKey: topology.kubernetes.io/zone

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# L1 Configuration
l1:
  enabled: false
  subnetId: ""
  chainId: ""
  bootstrapIds: ""
  bootstrapIps: ""

livenessProbe:
  exec:
    command:
      - /bin/sh
      - -c
      - "curl -sf localhost:9650/ext/info -X POST -H 'content-type:application/json' -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"info.getNodeID\"}'"
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  exec:
    command:
      - /bin/sh
      - -c
      - "curl -sf localhost:9650/ext/info -X POST -H 'content-type:application/json' -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"info.isBootstrapped\",\"params\":{\"chain\":\"P\"}}' | grep -q 'true'"
  initialDelaySeconds: 60
  periodSeconds: 10

serviceAccount:
  create: true
  name: ""

nodeSelector: {}
tolerations: []
