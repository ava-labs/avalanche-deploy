# L1 RPC - Subnet-EVM with Partial Sync
# For Avalanche L1 (subnet) RPC access

# Number of L1 RPC replicas
l1_rpc_replicas: 2

# Network: fuji or mainnet
network: fuji

# AvalancheGo image for L1
l1_rpc_image:
  # Use bundled subnet-evm + avalanchego image for L1 chains.
  repository: avaplatform/subnet-evm_avalanchego
  # Format: subnet-evm version + avalanchego version.
  tag: "v0.8.0_v1.14.0"
  pullPolicy: IfNotPresent

# Resource limits for L1 RPC (lower than validators)
l1_rpc_resources:
  requests:
    cpu: "2"
    memory: "8Gi"
  limits:
    cpu: "4"
    memory: "16Gi"

# Persistent storage (smaller than Primary Network due to partial sync)
l1_rpc_persistence:
  enabled: true
  storageClass: ""
  size: 500Gi
  accessModes:
    - ReadWriteOnce

# Node configuration
l1_rpc_config:
  httpPort: 9650
  stakingPort: 9651
  logLevel: info
  apiAdminEnabled: false
  apiInfoEnabled: true
  apiHealthEnabled: true
  indexEnabled: true  # Enable indexing for RPC queries
  # Partial sync for L1 - faster bootstrap, less storage.
  # AvalancheGo expects a boolean for this flag.
  partialSyncPrimaryNetwork: true
  # Host headers accepted by the HTTP API (--http-allowed-hosts).
  # AvalancheGo's built-in default is "localhost" only, which 403-rejects
  # in-cluster clients that reach the node via service DNS (e.g.
  # http://l1-rpc:9650). Empty list = chart default: localhost plus this
  # release's service DNS names (<svc>, <svc>.<ns>, <svc>.<ns>.svc,
  # <svc>.<ns>.svc.cluster.local). Matching is exact (no suffix wildcards);
  # use ["*"] to accept any host header. IP host headers are always accepted.
  httpAllowedHosts: []

# Service configuration - LoadBalancer for external access
l1_rpc_service:
  type: LoadBalancer
  httpPort: 9650
  stakingPort: 9651

# Horizontal pod autoscaler
l1_rpc_autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Node affinity - spread across zones
l1_rpc_affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: l1-rpc
          topologyKey: topology.kubernetes.io/zone

# Security context
l1_rpc_securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# L1 Configuration (set after create-l1)
l1:
  enabled: false
  subnetId: ""
  chainId: ""
  bootstrapIds: ""
  bootstrapIps: ""

# Liveness probe
l1_rpc_livenessProbe:
  httpGet:
    path: /ext/health/liveness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

# Readiness probe
l1_rpc_readinessProbe:
  httpGet:
    path: /ext/health/readiness
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10

# Service account
l1_rpc_serviceAccount:
  create: true
  name: ""

# Node selector
l1_rpc_nodeSelector: {}

# Tolerations
l1_rpc_tolerations: []
