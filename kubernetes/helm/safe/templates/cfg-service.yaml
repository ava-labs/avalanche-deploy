apiVersion: v1
kind: Service
metadata:
  name: {{ include "safe.fullname" . }}-cfg
  labels:
    {{- include "safe.cfg.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "safe.cfg.selectorLabels" . | nindent 4 }}
