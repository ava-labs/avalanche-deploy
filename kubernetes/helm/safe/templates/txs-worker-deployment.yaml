apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "safe.fullname" . }}-txs-worker
  labels:
    {{- include "safe.txsWorker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.txs.worker.replicas }}
  selector:
    matchLabels:
      {{- include "safe.txsWorker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "safe.txsWorker.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-txs.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: txs-worker
          image: "{{ .Values.txs.image.repository }}:{{ .Values.txs.image.tag }}"
          imagePullPolicy: {{ .Values.txs.image.pullPolicy }}
          command:
            - docker/web/celery/worker/run.sh
          envFrom:
            - configMapRef:
                name: {{ include "safe.fullname" . }}-txs
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "safe.fullname" . }}
                  key: txs-secret-key
            # Override WORKER_QUEUES to include "processing" queue
            # TXS v5.42.1 routes process_decoded_internal_txs_task to "processing"
            - name: WORKER_QUEUES
              value: {{ .Values.txs.worker.queues | quote }}
          resources:
            {{- toYaml .Values.txs.worker.resources | nindent 12 }}
