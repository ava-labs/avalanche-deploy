apiVersion: v1
kind: Secret
metadata:
  name: {{ include "safe.fullname" . }}
  labels:
    {{- include "safe.labels" . | nindent 4 }}
type: Opaque
stringData:
  # PostgreSQL CFG/TXS
  postgres-cfg-txs-password: {{ .Values.postgres.cfgTxs.password | quote }}
  # PostgreSQL CGW
  postgres-cgw-password: {{ .Values.postgres.cgw.password | quote }}
  # RabbitMQ
  rabbitmq-password: {{ .Values.rabbitmq.password | quote }}
  # Webhook token (shared between CFG and CGW)
  webhook-token: {{ .Values.webhookToken | quote }}
  # Django secret keys
  cfg-secret-key: {{ .Values.cfg.secretKey | default (randAlphaNum 50) | quote }}
  txs-secret-key: {{ .Values.txs.secretKey | default (randAlphaNum 50) | quote }}
