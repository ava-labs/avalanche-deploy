apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "safe.fullname" . }}-postgres-cfg-txs
  labels:
    {{- include "safe.postgresCfgTxs.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "safe.fullname" . }}-postgres-cfg-txs
  replicas: 1
  selector:
    matchLabels:
      {{- include "safe.postgresCfgTxs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "safe.postgresCfgTxs.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.cfgTxs.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "safe.fullname" . }}
                  key: postgres-cfg-txs-password
            # Create the CFG database by default; TXS database created in init-job
            - name: POSTGRES_DB
              value: {{ .Values.postgres.cfgTxs.cfgDatabase | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.cfgTxs.user | quote }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.cfgTxs.user | quote }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.postgres.cfgTxs.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.postgres.cfgTxs.storageClass }}
        storageClassName: {{ .Values.postgres.cfgTxs.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.cfgTxs.storage }}
