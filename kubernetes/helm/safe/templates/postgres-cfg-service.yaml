apiVersion: v1
kind: Service
metadata:
  name: {{ include "safe.fullname" . }}-postgres-cfg-txs
  labels:
    {{- include "safe.postgresCfgTxs.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "safe.postgresCfgTxs.selectorLabels" . | nindent 4 }}
