# Primary Network RPC - Standalone AvalancheGo
# For P-Chain, X-Chain, and C-Chain RPC access

# Number of RPC replicas
primary_rpc_replicas: 2

# Network: fuji or mainnet
network: fuji

# Standalone AvalancheGo image (no subnet-evm)
primary_rpc_image:
  repository: avaplatform/avalanchego
  tag: "v1.14.1"
  pullPolicy: IfNotPresent

# Resource limits for Primary Network RPC (lower than validators)
primary_rpc_resources:
  requests:
    cpu: "2"
    memory: "8Gi"
  limits:
    cpu: "4"
    memory: "16Gi"

# Persistent storage
primary_rpc_persistence:
  enabled: true
  storageClass: ""
  size: 1000Gi  # Primary Network needs more storage
  accessModes:
    - ReadWriteOnce

# Node configuration
primary_rpc_config:
  httpPort: 9650
  stakingPort: 9651
  logLevel: info
  apiAdminEnabled: false
  apiInfoEnabled: true
  apiHealthEnabled: true
  indexEnabled: true  # Enable indexing for RPC queries
  # Host headers accepted by the HTTP API (--http-allowed-hosts).
  # AvalancheGo's built-in default is "localhost" only, which 403-rejects
  # in-cluster clients that reach the node via service DNS (e.g.
  # http://primary-rpc:9650). Empty list = chart default: localhost plus
  # this release's service DNS names (<svc>, <svc>.<ns>, <svc>.<ns>.svc,
  # <svc>.<ns>.svc.cluster.local). Matching is exact (no suffix wildcards);
  # use ["*"] to accept any host header. IP host headers are always accepted.
  httpAllowedHosts: []

# Service configuration - LoadBalancer for external access
primary_rpc_service:
  type: LoadBalancer
  httpPort: 9650
  stakingPort: 9651

# Horizontal pod autoscaler
primary_rpc_autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Node affinity - spread across zones
primary_rpc_affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: primary-network-rpc
          topologyKey: topology.kubernetes.io/zone

# Security context
primary_rpc_securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Liveness probe
primary_rpc_livenessProbe:
  httpGet:
    path: /ext/health/liveness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

# Readiness probe
primary_rpc_readinessProbe:
  httpGet:
    path: /ext/health/readiness
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10

# Service account
primary_rpc_serviceAccount:
  create: true
  name: ""

# Node selector
primary_rpc_nodeSelector: {}

# Tolerations
primary_rpc_tolerations: []
