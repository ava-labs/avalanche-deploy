apiVersion: v1
kind: Service
metadata:
  name: {{ include "primary-network-rpc.fullname" . }}
  labels:
    {{- include "primary-network-rpc.labels" . | nindent 4 }}
spec:
  type: {{ .Values.primary_rpc_service.type }}
  ports:
    - port: {{ .Values.primary_rpc_service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.primary_rpc_service.stakingPort }}
      targetPort: staking
      protocol: TCP
      name: staking
  selector:
    {{- include "primary-network-rpc.selectorLabels" . | nindent 4 }}
