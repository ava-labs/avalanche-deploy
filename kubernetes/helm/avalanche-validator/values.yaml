# L1 Validator - Subnet-EVM with Partial Sync
# For Avalanche L1 (subnet) validation

# Number of L1 validator replicas
l1_validator_replicas: 3

# Network: fuji or mainnet
network: fuji

# AvalancheGo image for L1
l1_validator_image:
  # subnet-evm is bundled with avalanchego in modern releases.
  repository: avaplatform/avalanchego
  tag: "v1.14.1"
  pullPolicy: IfNotPresent

# Resource limits for L1 validators
l1_validator_resources:
  requests:
    cpu: "4"
    memory: "16Gi"
  limits:
    cpu: "8"
    memory: "32Gi"

# Persistent storage (smaller than Primary Network due to partial sync)
l1_validator_persistence:
  enabled: true
  storageClass: ""  # Use default
  size: 500Gi
  accessModes:
    - ReadWriteOnce

# Node configuration
l1_validator_config:
  httpPort: 9650
  stakingPort: 9651
  logLevel: info
  apiAdminEnabled: false
  apiInfoEnabled: true
  apiHealthEnabled: true
  indexEnabled: false
  # Partial sync for L1 - faster bootstrap, less storage.
  # AvalancheGo expects a boolean for this flag.
  partialSyncPrimaryNetwork: true

# Service configuration
l1_validator_service:
  type: ClusterIP
  httpPort: 9650
  stakingPort: 9651

# Pod disruption budget
l1_validator_pdb:
  enabled: true
  minAvailable: 2

# Node affinity - spread across zones
l1_validator_affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: l1-validator
          topologyKey: topology.kubernetes.io/zone

# Security context
l1_validator_securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# L1 Configuration (set after create-l1)
l1:
  enabled: false
  subnetId: ""
  chainId: ""
  bootstrapIds: ""  # Comma-separated NodeIDs
  bootstrapIps: ""  # Comma-separated IP:port

# Liveness probe
l1_validator_livenessProbe:
  httpGet:
    path: /ext/health/liveness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

# Readiness probe
l1_validator_readinessProbe:
  httpGet:
    path: /ext/health/readiness
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

# Service account
l1_validator_serviceAccount:
  create: true
  name: ""

# Node selector
l1_validator_nodeSelector: {}

# Tolerations
l1_validator_tolerations: []
