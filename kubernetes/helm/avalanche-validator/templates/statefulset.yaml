apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "l1-validator.fullname" . }}
  labels:
    {{- include "l1-validator.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "l1-validator.fullname" . }}
  replicas: {{ .Values.l1_validator_replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "l1-validator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "l1-validator.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.l1_validator_affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.l1_validator_nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.l1_validator_tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "l1-validator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.l1_validator_securityContext | nindent 8 }}
      containers:
        - name: avalanchego
          image: "{{ .Values.l1_validator_image.repository }}:{{ .Values.l1_validator_image.tag }}"
          imagePullPolicy: {{ .Values.l1_validator_image.pullPolicy }}
          env:
            - name: HOME
              value: /data
          command:
            - /avalanchego/build/avalanchego
          args:
            - --network-id={{ include "l1-validator.networkId" . }}
            - --http-host=0.0.0.0
            - --http-allowed-hosts={{ include "l1-validator.httpAllowedHosts" . }}
            - --http-port={{ .Values.l1_validator_config.httpPort }}
            - --staking-port={{ .Values.l1_validator_config.stakingPort }}
            - --log-level={{ .Values.l1_validator_config.logLevel }}
            - --api-admin-enabled={{ .Values.l1_validator_config.apiAdminEnabled }}
            - --api-info-enabled={{ .Values.l1_validator_config.apiInfoEnabled }}
            - --api-health-enabled={{ .Values.l1_validator_config.apiHealthEnabled }}
            - --index-enabled={{ .Values.l1_validator_config.indexEnabled }}
            - --db-dir=/data/db
            - --plugin-dir=/avalanchego/build/plugins
            # Partial sync for L1 - only sync P-Chain from Primary Network
            {{- if .Values.l1_validator_config.partialSyncPrimaryNetwork }}
            - --partial-sync-primary-network={{ .Values.l1_validator_config.partialSyncPrimaryNetwork }}
            {{- end }}
            {{- if .Values.l1.enabled }}
            - --track-subnets={{ .Values.l1.subnetId }}
            {{- if .Values.l1.bootstrapIds }}
            - --bootstrap-ids={{ .Values.l1.bootstrapIds }}
            - --bootstrap-ips={{ .Values.l1.bootstrapIps }}
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.l1_validator_config.httpPort }}
              protocol: TCP
            - name: staking
              containerPort: {{ .Values.l1_validator_config.stakingPort }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.l1_validator_livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.l1_validator_readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.l1_validator_resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  {{- if .Values.l1_validator_persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.l1_validator_persistence.accessModes | nindent 10 }}
        {{- if .Values.l1_validator_persistence.storageClass }}
        storageClassName: {{ .Values.l1_validator_persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.l1_validator_persistence.size }}
  {{- end }}
