apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "avalanche-validator.fullname" . }}
  labels:
    {{- include "avalanche-validator.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "avalanche-validator.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "avalanche-validator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "avalanche-validator.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "avalanche-validator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: avalanchego
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --network-id={{ include "avalanche-validator.networkId" . }}
            - --http-host=0.0.0.0
            - --http-port={{ .Values.config.httpPort }}
            - --staking-port={{ .Values.config.stakingPort }}
            - --log-level={{ .Values.config.logLevel }}
            - --api-admin-enabled={{ .Values.config.apiAdminEnabled }}
            - --api-info-enabled={{ .Values.config.apiInfoEnabled }}
            - --api-health-enabled={{ .Values.config.apiHealthEnabled }}
            - --index-enabled={{ .Values.config.indexEnabled }}
            - --db-dir=/data/db
            {{- if .Values.l1.enabled }}
            - --track-subnets={{ .Values.l1.subnetId }}
            {{- if .Values.l1.bootstrapIds }}
            - --bootstrap-ids={{ .Values.l1.bootstrapIds }}
            - --bootstrap-ips={{ .Values.l1.bootstrapIps }}
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.config.httpPort }}
              protocol: TCP
            - name: staking
              containerPort: {{ .Values.config.stakingPort }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
