apiVersion: v1
kind: Service
metadata:
  name: {{ include "avalanche-validator.fullname" . }}
  labels:
    {{- include "avalanche-validator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  clusterIP: None  # Headless service for StatefulSet
  ports:
    - port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.stakingPort }}
      targetPort: staking
      protocol: TCP
      name: staking
  selector:
    {{- include "avalanche-validator.selectorLabels" . | nindent 4 }}
---
# Service for external P2P access
apiVersion: v1
kind: Service
metadata:
  name: {{ include "avalanche-validator.fullname" . }}-p2p
  labels:
    {{- include "avalanche-validator.labels" . | nindent 4 }}
spec:
  type: LoadBalancer
  ports:
    - port: {{ .Values.service.stakingPort }}
      targetPort: staking
      protocol: TCP
      name: staking
  selector:
    {{- include "avalanche-validator.selectorLabels" . | nindent 4 }}
