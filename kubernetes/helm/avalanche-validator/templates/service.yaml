apiVersion: v1
kind: Service
metadata:
  name: {{ include "l1-validator.fullname" . }}
  labels:
    {{- include "l1-validator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.l1_validator_service.type }}
  clusterIP: None  # Headless service for StatefulSet
  ports:
    - port: {{ .Values.l1_validator_service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.l1_validator_service.stakingPort }}
      targetPort: staking
      protocol: TCP
      name: staking
  selector:
    {{- include "l1-validator.selectorLabels" . | nindent 4 }}
---
# Service for external P2P access
apiVersion: v1
kind: Service
metadata:
  name: {{ include "l1-validator.fullname" . }}-p2p
  labels:
    {{- include "l1-validator.labels" . | nindent 4 }}
spec:
  type: LoadBalancer
  ports:
    - port: {{ .Values.l1_validator_service.stakingPort }}
      targetPort: staking
      protocol: TCP
      name: staking
  selector:
    {{- include "l1-validator.selectorLabels" . | nindent 4 }}
