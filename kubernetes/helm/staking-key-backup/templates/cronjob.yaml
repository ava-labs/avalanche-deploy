apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "staking-key-backup.fullname" . }}
  labels:
    {{- include "staking-key-backup.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  concurrencyPolicy: Forbid
  jobTemplate:
    metadata:
      labels:
        {{- include "staking-key-backup.selectorLabels" . | nindent 8 }}
    spec:
      activeDeadlineSeconds: {{ .Values.activeDeadlineSeconds }}
      backoffLimit: {{ .Values.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "staking-key-backup.selectorLabels" . | nindent 12 }}
        spec:
          serviceAccountName: {{ include "staking-key-backup.serviceAccountName" . }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          restartPolicy: {{ .Values.restartPolicy }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: backup
              image: {{ include "staking-key-backup.image" . }}
              imagePullPolicy: {{ include "staking-key-backup.imagePullPolicy" . }}
              command:
                - /bin/sh
                - -c
                - |
                  set -eu

                  TIMESTAMP="$(date -u +%Y%m%dT%H%M%SZ)"
                  RELEASE="{{ .Values.validatorRelease }}"
                  BUCKET="{{ .Values.storage.bucket }}"
                  PREFIX="{{ .Values.storage.prefix }}"
                  STAKING_PATH="{{ .Values.stakingKeyPath }}"
                  PROVIDER="{{ .Values.storage.provider }}"

                  if [ -z "$BUCKET" ]; then
                    echo "Error: storage.bucket is not set"
                    exit 1
                  fi

                  echo "============================================"
                  echo "  Staking Key Backup"
                  echo "  $(date -u)"
                  echo "============================================"
                  echo ""

                  # Find validator pods using label selector
                  PODS=$(kubectl get pods \
                    {{- range $key, $value := .Values.validatorPodLabels }}
                    -l "{{ $key }}={{ $value }}" \
                    {{- end }}
                    -l "app.kubernetes.io/instance=${RELEASE}" \
                    --field-selector=status.phase=Running \
                    -o jsonpath='{.items[*].metadata.name}')

                  if [ -z "$PODS" ]; then
                    echo "Error: no running validator pods found for release: ${RELEASE}"
                    exit 1
                  fi

                  SUCCESS=0
                  FAIL=0

                  for pod in $PODS; do
                    echo "Backing up keys from ${pod}..."

                    # Create temp directory for this pod
                    TMPDIR="/tmp/backup-${pod}"
                    mkdir -p "$TMPDIR"

                    # Copy staking keys from validator pod
                    if ! kubectl cp "${pod}:${STAKING_PATH}/staker.key" "${TMPDIR}/staker.key" 2>/dev/null; then
                      echo "  Warning: failed to copy staker.key from ${pod}"
                      FAIL=$((FAIL + 1))
                      rm -rf "$TMPDIR"
                      continue
                    fi

                    if ! kubectl cp "${pod}:${STAKING_PATH}/staker.crt" "${TMPDIR}/staker.crt" 2>/dev/null; then
                      echo "  Warning: failed to copy staker.crt from ${pod}"
                      FAIL=$((FAIL + 1))
                      rm -rf "$TMPDIR"
                      continue
                    fi

                    # Also copy signer key if it exists (BLS key for L1 validators)
                    kubectl cp "${pod}:${STAKING_PATH}/signer.key" "${TMPDIR}/signer.key" 2>/dev/null || true

                    # Create compressed archive
                    ARCHIVE="/tmp/staking-keys-${pod}.tar.gz"
                    tar -czf "$ARCHIVE" -C "$TMPDIR" .
                    rm -rf "$TMPDIR"

                    # Upload to cloud storage
                    if [ "$PROVIDER" = "s3" ]; then
                      # Upload current (latest) copy
                      aws s3 cp "$ARCHIVE" \
                        "s3://${BUCKET}/${PREFIX}${pod}/staking-keys.tar.gz" \
                        --region "{{ .Values.storage.region }}" \
                        --quiet

                      # Upload timestamped archive
                      aws s3 cp "$ARCHIVE" \
                        "s3://${BUCKET}/${PREFIX}${pod}/backups/staking-keys-${TIMESTAMP}.tar.gz" \
                        --region "{{ .Values.storage.region }}" \
                        --quiet
                    elif [ "$PROVIDER" = "gcs" ]; then
                      # Upload current (latest) copy
                      gsutil -q cp "$ARCHIVE" \
                        "gs://${BUCKET}/${PREFIX}${pod}/staking-keys.tar.gz"

                      # Upload timestamped archive
                      gsutil -q cp "$ARCHIVE" \
                        "gs://${BUCKET}/${PREFIX}${pod}/backups/staking-keys-${TIMESTAMP}.tar.gz"
                    fi

                    rm -f "$ARCHIVE"
                    echo "  OK: ${pod}"
                    SUCCESS=$((SUCCESS + 1))
                  done

                  echo ""
                  echo "============================================"
                  echo "  Backup Complete"
                  echo "  Success: ${SUCCESS}  Failed: ${FAIL}"
                  echo "============================================"

                  if [ "$FAIL" -gt 0 ]; then
                    exit 1
                  fi
              env:
                {{- if and (eq .Values.storage.provider "s3") .Values.aws.accessKeyId }}
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "staking-key-backup.fullname" . }}
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "staking-key-backup.fullname" . }}
                      key: AWS_SECRET_ACCESS_KEY
                {{- end }}
                {{- if eq .Values.storage.provider "s3" }}
                - name: AWS_DEFAULT_REGION
                  value: {{ .Values.storage.region | quote }}
                {{- end }}
                {{- if and (eq .Values.storage.provider "gcs") .Values.gcs.serviceAccountKey }}
                - name: GOOGLE_APPLICATION_CREDENTIALS
                  value: /etc/gcs/gcs-service-account.json
                {{- end }}
              {{- if and (eq .Values.storage.provider "gcs") .Values.gcs.serviceAccountKey }}
              volumeMounts:
                - name: gcs-credentials
                  mountPath: /etc/gcs
                  readOnly: true
              {{- end }}
          {{- if and (eq .Values.storage.provider "gcs") .Values.gcs.serviceAccountKey }}
          volumes:
            - name: gcs-credentials
              secret:
                secretName: {{ include "staking-key-backup.fullname" . }}
          {{- end }}
