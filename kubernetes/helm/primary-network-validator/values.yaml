# Primary Network Validator - Standalone AvalancheGo
# For P-Chain, X-Chain, and C-Chain validation

# Number of validator replicas
primary_validator_replicas: 3

# Network: fuji or mainnet
network: fuji

# Standalone AvalancheGo image (no subnet-evm)
primary_validator_image:
  repository: avaplatform/avalanchego
  tag: "v1.14.1"
  pullPolicy: IfNotPresent

# Resource limits for Primary Network validators
primary_validator_resources:
  requests:
    cpu: "4"
    memory: "16Gi"
  limits:
    cpu: "8"
    memory: "32Gi"

# Persistent storage
primary_validator_persistence:
  enabled: true
  storageClass: ""  # Use default
  size: 1000Gi     # Primary Network needs more storage for full history
  accessModes:
    - ReadWriteOnce

# Node configuration
primary_validator_config:
  httpPort: 9650
  stakingPort: 9651
  logLevel: info
  apiAdminEnabled: false
  apiInfoEnabled: true
  apiHealthEnabled: true
  indexEnabled: false
  # Full sync for Primary Network (no partial sync)
  stateSync: false
  # Host headers accepted by the HTTP API (--http-allowed-hosts).
  # AvalancheGo's built-in default is "localhost" only, which 403-rejects
  # in-cluster clients that reach the node via service DNS. Empty list =
  # chart default: localhost, this release's service DNS names (<svc>,
  # <svc>.<ns>, <svc>.<ns>.svc, <svc>.<ns>.svc.cluster.local) and the
  # per-pod StatefulSet DNS names (<pod>.<svc>...) for each replica.
  # Matching is exact (no suffix wildcards); use ["*"] to accept any host
  # header. IP host headers are always accepted.
  httpAllowedHosts: []

# Service configuration
primary_validator_service:
  type: ClusterIP
  httpPort: 9650
  stakingPort: 9651

# Pod disruption budget
primary_validator_pdb:
  enabled: true
  minAvailable: 2

# Node affinity - spread across zones
primary_validator_affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: primary-network-validator
          topologyKey: topology.kubernetes.io/zone

# Security context
primary_validator_securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Liveness probe
primary_validator_livenessProbe:
  httpGet:
    path: /ext/health/liveness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

# Readiness probe
primary_validator_readinessProbe:
  httpGet:
    path: /ext/health/readiness
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

# Service account
primary_validator_serviceAccount:
  create: true
  name: ""

# Node selector
primary_validator_nodeSelector: {}

# Tolerations
primary_validator_tolerations: []
