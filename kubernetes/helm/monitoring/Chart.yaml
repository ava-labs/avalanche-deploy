apiVersion: v2
name: avalanche-monitoring
description: Prometheus and Grafana monitoring for Avalanche L1
type: application
version: 0.1.0
appVersion: "2.54.1"

dependencies:
  - name: prometheus
    version: "25.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: grafana
    version: "7.x.x"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled
