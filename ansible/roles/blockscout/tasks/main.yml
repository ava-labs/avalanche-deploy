---
# Blockscout installation using Docker Compose

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Start Docker service
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Create blockscout group
  ansible.builtin.group:
    name: "{{ blockscout_group }}"
    system: true

- name: Create blockscout user
  ansible.builtin.user:
    name: "{{ blockscout_user }}"
    group: "{{ blockscout_group }}"
    groups: docker
    system: true
    shell: /bin/bash
    create_home: true

- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ blockscout_user }}"
    group: "{{ blockscout_group }}"
    mode: "0755"
  loop:
    - "{{ blockscout_install_dir }}"
    - "{{ blockscout_data_dir }}"
    - "{{ blockscout_data_dir }}/postgres"
    - "{{ blockscout_data_dir }}/redis"
    - "{{ blockscout_data_dir }}/logs"

# Secret generation - generate once, persist to disk, reuse on re-runs so the
# postgres volume and all templates always see the same credentials
- name: Check for existing DB password
  ansible.builtin.stat:
    path: "{{ blockscout_install_dir }}/.db_password"
  register: blockscout_db_password_file

- name: Read existing DB password
  ansible.builtin.slurp:
    src: "{{ blockscout_install_dir }}/.db_password"
  register: blockscout_existing_db_password
  when: blockscout_db_password_file.stat.exists
  no_log: true

- name: Generate new DB password
  ansible.builtin.set_fact:
    blockscout_db_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
  when: not blockscout_db_password_file.stat.exists and blockscout_db_password | length == 0
  no_log: true

- name: Use existing DB password
  ansible.builtin.set_fact:
    blockscout_db_password: "{{ blockscout_existing_db_password.content | b64decode | trim }}"
  when: blockscout_db_password_file.stat.exists
  no_log: true

- name: Persist DB password
  ansible.builtin.copy:
    content: "{{ blockscout_db_password }}"
    dest: "{{ blockscout_install_dir }}/.db_password"
    owner: "{{ blockscout_user }}"
    group: "{{ blockscout_group }}"
    mode: "0600"
  no_log: true

- name: Check for existing SECRET_KEY_BASE
  ansible.builtin.stat:
    path: "{{ blockscout_install_dir }}/.secret_key_base"
  register: blockscout_secret_key_base_file

- name: Read existing SECRET_KEY_BASE
  ansible.builtin.slurp:
    src: "{{ blockscout_install_dir }}/.secret_key_base"
  register: blockscout_existing_secret_key_base
  when: blockscout_secret_key_base_file.stat.exists
  no_log: true

- name: Generate new SECRET_KEY_BASE
  ansible.builtin.set_fact:
    blockscout_secret_key_base: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
  when: not blockscout_secret_key_base_file.stat.exists and blockscout_secret_key_base | length == 0
  no_log: true

- name: Use existing SECRET_KEY_BASE
  ansible.builtin.set_fact:
    blockscout_secret_key_base: "{{ blockscout_existing_secret_key_base.content | b64decode | trim }}"
  when: blockscout_secret_key_base_file.stat.exists
  no_log: true

- name: Persist SECRET_KEY_BASE
  ansible.builtin.copy:
    content: "{{ blockscout_secret_key_base }}"
    dest: "{{ blockscout_install_dir }}/.secret_key_base"
    owner: "{{ blockscout_user }}"
    group: "{{ blockscout_group }}"
    mode: "0600"
  no_log: true

- name: Generate docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ blockscout_install_dir }}/docker-compose.yml"
    owner: "{{ blockscout_user }}"
    group: "{{ blockscout_group }}"
    mode: "0644"
  notify: Restart blockscout

- name: Generate backend environment file
  ansible.builtin.template:
    src: backend.env.j2
    dest: "{{ blockscout_install_dir }}/backend.env"
    owner: "{{ blockscout_user }}"
    group: "{{ blockscout_group }}"
    mode: "0600"
  notify: Restart blockscout

- name: Generate frontend environment file
  ansible.builtin.template:
    src: frontend.env.j2
    dest: "{{ blockscout_install_dir }}/frontend.env"
    owner: "{{ blockscout_user }}"
    group: "{{ blockscout_group }}"
    mode: "0644"
  notify: Restart blockscout

- name: Generate common environment file
  ansible.builtin.template:
    src: common.env.j2
    dest: "{{ blockscout_install_dir }}/common.env"
    owner: "{{ blockscout_user }}"
    group: "{{ blockscout_group }}"
    mode: "0644"
  notify: Restart blockscout

- name: Create systemd service for blockscout
  ansible.builtin.template:
    src: blockscout.service.j2
    dest: /etc/systemd/system/blockscout.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart blockscout

# Prefetch images so the systemd start below stays within TimeoutStartSec.
# --policy missing only fetches tags not already present locally, so with the
# pinned tags in defaults a re-run never silently upgrades a running stack;
# a changed pin is fetched, an unchanged one is left alone. Use
# -e force_pull=true to re-pull a tag that was re-published upstream.
- name: Pull Docker images (missing tags only unless force_pull=true)
  ansible.builtin.command: >-
    docker compose pull
    --policy {{ 'always' if (force_pull | default(false) | bool) else 'missing' }}
  args:
    chdir: "{{ blockscout_install_dir }}"
  register: blockscout_pull
  changed_when: "'Pulled' in blockscout_pull.stdout or 'Downloaded' in blockscout_pull.stdout"

- name: Enable and start Blockscout
  ansible.builtin.systemd:
    name: blockscout
    enabled: true
    state: started
    daemon_reload: true

# Apply any pending env/compose changes now (systemd stop/start = compose
# down + up, which re-reads env files) so the readiness check below validates
# the configuration we just rendered, not a stale running stack
- name: Apply pending Blockscout restarts
  ansible.builtin.meta: flush_handlers

- name: Wait for Blockscout to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ blockscout_http_port }}/api/v2/stats"
    method: GET
    status_code: [200, 503]
  register: blockscout_ready
  until: blockscout_ready.status == 200
  retries: 60
  delay: 10

- name: Display Blockscout URL
  ansible.builtin.debug:
    msg: |
      Blockscout is available at:
      - Frontend: http://{{ ansible_host }}:{{ blockscout_frontend_port }}
      - API: http://{{ ansible_host }}:{{ blockscout_http_port }}/api
