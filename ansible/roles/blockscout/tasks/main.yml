---
# Blockscout installation using Docker Compose

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Start Docker service
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Create blockscout group
  ansible.builtin.group:
    name: "{{ blockscout_group }}"
    system: true

- name: Create blockscout user
  ansible.builtin.user:
    name: "{{ blockscout_user }}"
    group: "{{ blockscout_group }}"
    groups: docker
    system: true
    shell: /bin/bash
    create_home: true

- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ blockscout_user }}"
    group: "{{ blockscout_group }}"
    mode: "0755"
  loop:
    - "{{ blockscout_install_dir }}"
    - "{{ blockscout_data_dir }}"
    - "{{ blockscout_data_dir }}/postgres"
    - "{{ blockscout_data_dir }}/redis"
    - "{{ blockscout_data_dir }}/logs"

- name: Generate docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ blockscout_install_dir }}/docker-compose.yml"
    owner: "{{ blockscout_user }}"
    group: "{{ blockscout_group }}"
    mode: "0644"
  notify: Restart blockscout

- name: Generate backend environment file
  ansible.builtin.template:
    src: backend.env.j2
    dest: "{{ blockscout_install_dir }}/backend.env"
    owner: "{{ blockscout_user }}"
    group: "{{ blockscout_group }}"
    mode: "0600"
  notify: Restart blockscout

- name: Generate frontend environment file
  ansible.builtin.template:
    src: frontend.env.j2
    dest: "{{ blockscout_install_dir }}/frontend.env"
    owner: "{{ blockscout_user }}"
    group: "{{ blockscout_group }}"
    mode: "0644"
  notify: Restart blockscout

- name: Generate common environment file
  ansible.builtin.template:
    src: common.env.j2
    dest: "{{ blockscout_install_dir }}/common.env"
    owner: "{{ blockscout_user }}"
    group: "{{ blockscout_group }}"
    mode: "0644"
  notify: Restart blockscout

- name: Create systemd service for blockscout
  ansible.builtin.template:
    src: blockscout.service.j2
    dest: /etc/systemd/system/blockscout.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart blockscout

- name: Pull Docker images
  ansible.builtin.command: docker compose pull
  args:
    chdir: "{{ blockscout_install_dir }}"
  register: blockscout_pull
  changed_when: "'Pulled' in blockscout_pull.stdout or 'Downloaded' in blockscout_pull.stdout"

- name: Enable and start Blockscout
  ansible.builtin.systemd:
    name: blockscout
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Blockscout to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ blockscout_http_port }}/api/v2/stats"
    method: GET
    status_code: [200, 503]
  register: blockscout_ready
  until: blockscout_ready.status == 200
  retries: 60
  delay: 10
  ignore_errors: true

- name: Display Blockscout URL
  ansible.builtin.debug:
    msg: |
      Blockscout is available at:
      - Frontend: http://{{ ansible_host }}:{{ blockscout_frontend_port }}
      - API: http://{{ ansible_host }}:{{ blockscout_http_port }}/api
