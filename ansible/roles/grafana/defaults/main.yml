---
# Grafana role defaults

grafana_version: "11.2.2"
grafana_user: grafana
grafana_group: grafana

grafana_config_dir: /etc/grafana
grafana_data_dir: /var/lib/grafana
grafana_port: 3000

# Authentication
grafana_anonymous_enabled: true
grafana_admin_user: admin
# Admin password: leave empty to auto-generate once on first run and persist it
# to grafana_admin_password_file (0600) on the monitoring host. Set this
# explicitly (e.g. -e grafana_admin_password=...) to manage the credential externally.
grafana_admin_password: ""
grafana_admin_password_file: "{{ grafana_config_dir }}/.admin_password"

# Prometheus datasource
grafana_prometheus_url: "http://localhost:9090"
