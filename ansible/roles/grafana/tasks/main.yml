---
# Grafana installation and configuration

- name: Create grafana group
  ansible.builtin.group:
    name: "{{ grafana_group }}"
    system: true

- name: Create grafana user
  ansible.builtin.user:
    name: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    system: true
    shell: /bin/false
    create_home: false

- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: "0755"
  loop:
    - "{{ grafana_config_dir }}"
    - "{{ grafana_config_dir }}/provisioning"
    - "{{ grafana_config_dir }}/provisioning/datasources"
    - "{{ grafana_config_dir }}/provisioning/dashboards"
    - "{{ grafana_data_dir }}"
    - "{{ grafana_data_dir }}/dashboards"

- name: Download Grafana
  ansible.builtin.get_url:
    url: "https://dl.grafana.com/oss/release/grafana-{{ grafana_version }}.linux-amd64.tar.gz"
    dest: /tmp/grafana.tar.gz
    mode: "0644"

- name: Extract Grafana
  ansible.builtin.unarchive:
    src: /tmp/grafana.tar.gz
    dest: /opt/
    remote_src: true
    creates: "/opt/grafana-v{{ grafana_version }}"

- name: Create symlink
  ansible.builtin.file:
    src: "/opt/grafana-v{{ grafana_version }}"
    dest: /opt/grafana
    state: link

# Admin password - generate once, persist to disk, reuse on re-runs so the
# credential survives re-deploys. Override grafana_admin_password to manage
# the credential externally (the override is persisted to the same file).
- name: Check for existing admin password
  ansible.builtin.stat:
    path: "{{ grafana_admin_password_file }}"
  register: grafana_admin_password_stat

- name: Read existing admin password
  ansible.builtin.slurp:
    src: "{{ grafana_admin_password_file }}"
  register: grafana_existing_admin_password
  when: grafana_admin_password_stat.stat.exists
  no_log: true

- name: Generate new admin password
  ansible.builtin.set_fact:
    grafana_admin_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
  when: not grafana_admin_password_stat.stat.exists and grafana_admin_password | length == 0
  no_log: true

- name: Use existing admin password
  ansible.builtin.set_fact:
    grafana_admin_password: "{{ grafana_existing_admin_password.content | b64decode | trim }}"
  when: grafana_admin_password_stat.stat.exists and grafana_admin_password | length == 0
  no_log: true

- name: Persist admin password
  ansible.builtin.copy:
    content: "{{ grafana_admin_password }}"
    dest: "{{ grafana_admin_password_file }}"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: "0600"
  no_log: true

- name: Generate Grafana configuration
  ansible.builtin.template:
    src: grafana.ini.j2
    dest: "{{ grafana_config_dir }}/grafana.ini"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: "0600"
  notify: Restart grafana

- name: Configure datasource provisioning
  ansible.builtin.template:
    src: datasources.yml.j2
    dest: "{{ grafana_config_dir }}/provisioning/datasources/datasources.yml"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: "0644"
  notify: Restart grafana

- name: Configure dashboard provisioning
  ansible.builtin.template:
    src: dashboards.yml.j2
    dest: "{{ grafana_config_dir }}/provisioning/dashboards/dashboards.yml"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: "0644"
  notify: Restart grafana

- name: Copy all dashboards
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ grafana_data_dir }}/dashboards/"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: "0644"
  with_fileglob:
    - "*.json"
  notify: Restart grafana

- name: Create systemd service
  ansible.builtin.template:
    src: grafana.service.j2
    dest: /etc/systemd/system/grafana.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart grafana

- name: Enable and start Grafana
  ansible.builtin.systemd:
    name: grafana
    enabled: true
    state: started
    daemon_reload: true

# Apply any pending config/service changes now so the readiness check below
# validates the configuration we just rendered, not a stale running instance
- name: Apply pending Grafana restarts
  ansible.builtin.meta: flush_handlers

- name: Wait for Grafana to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ grafana_port }}/api/health"
    method: GET
  register: grafana_ready
  until: grafana_ready.status == 200
  retries: 30
  delay: 5

- name: Clean up temp files
  ansible.builtin.file:
    path: /tmp/grafana.tar.gz
    state: absent
