---
# Mount local NVMe drives for high-performance storage
# This handles AWS instance store, GCP local SSD, and Azure Lsv3
#
# The NVMe is mounted to {{ avalanchego_data_dir }} (/var/lib/avalanchego)
# which contains db/ and plugins/

- name: Check for NVMe devices
  ansible.builtin.shell: |
    set -o pipefail
    for dev in /dev/nvme*n1; do
      [ -b "$dev" ] || continue
      if ! lsblk -n "$dev" 2>/dev/null | grep -q "part"; then
        if ! mount | grep -q "^$dev "; then
          echo "$dev"
          exit 0
        fi
      fi
    done
  args:
    executable: /bin/bash
  register: avalanchego_nvme_device
  changed_when: false

- name: Display NVMe device status
  ansible.builtin.debug:
    msg: >-
      {% if avalanchego_nvme_device.stdout %}
      Found NVMe device: {{ avalanchego_nvme_device.stdout }}
      {% else %}
      No unmounted NVMe instance store found, using root disk
      {% endif %}

- name: Format NVMe device
  when: avalanchego_nvme_device.stdout | length > 0
  block:
    - name: Check if already formatted
      ansible.builtin.command: "blkid {{ avalanchego_nvme_device.stdout }}"
      register: avalanchego_blkid_result
      changed_when: false
      failed_when: false

    - name: Format NVMe with ext4
      community.general.filesystem:
        fstype: ext4
        dev: "{{ avalanchego_nvme_device.stdout }}"
      when: avalanchego_blkid_result.rc != 0

- name: Create data directory
  ansible.builtin.file:
    path: "{{ avalanchego_data_dir }}"
    state: directory
    mode: "0755"
  when: avalanchego_nvme_device.stdout | length > 0

- name: Mount NVMe device
  ansible.posix.mount:
    path: "{{ avalanchego_data_dir }}"
    src: "{{ avalanchego_nvme_device.stdout }}"
    fstype: ext4
    opts: defaults,noatime,nodiratime,discard
    state: mounted
  when: avalanchego_nvme_device.stdout | length > 0

- name: Set ownership of mounted filesystem
  ansible.builtin.file:
    path: "{{ avalanchego_data_dir }}"
    owner: "{{ avalanchego_user }}"
    group: "{{ avalanchego_group }}"
    mode: "0755"
    state: directory
  when: avalanchego_nvme_device.stdout | length > 0
