---
# Mount local NVMe drives for high-performance storage
# This handles AWS instance store, GCP local SSD, and Azure Lsv3
#
# The NVMe is mounted to {{ avalanchego_data_dir }} (/var/lib/avalanchego)
# which contains db/ and plugins/

- name: Check for NVMe devices
  ansible.builtin.shell: |
    set -o pipefail
    for dev in /dev/nvme*n1; do
      [ -b "$dev" ] || continue
      if ! lsblk -n "$dev" 2>/dev/null | grep -q "part"; then
        if ! mount | grep -q "^$dev "; then
          echo "$dev"
          exit 0
        fi
      fi
    done
  args:
    executable: /bin/bash
  register: avalanchego_nvme_device
  changed_when: false

- name: Display NVMe device status
  ansible.builtin.debug:
    msg: >-
      {% if avalanchego_nvme_device.stdout %}
      Found NVMe device: {{ avalanchego_nvme_device.stdout }}
      {% else %}
      No unmounted NVMe instance store found, using root disk
      {% endif %}

- name: Format NVMe device
  when: avalanchego_nvme_device.stdout | length > 0
  block:
    - name: Check if already formatted
      ansible.builtin.command: "blkid {{ avalanchego_nvme_device.stdout }}"
      register: avalanchego_blkid_result
      changed_when: false
      failed_when: false

    - name: Format NVMe with ext4
      community.general.filesystem:
        fstype: ext4
        dev: "{{ avalanchego_nvme_device.stdout }}"
      when: avalanchego_blkid_result.rc != 0

- name: Create data directory
  ansible.builtin.file:
    path: "{{ avalanchego_data_dir }}"
    state: directory
    mode: "0755"
  when: avalanchego_nvme_device.stdout | length > 0

# Mount by filesystem UUID, not raw device name: /dev/nvme* names are not
# stable across reboots/instance types. nofail keeps the instance bootable if
# the data disk is ever missing (e.g. instance-store loss on stop/start).
- name: Read filesystem UUID of NVMe device
  ansible.builtin.command: "blkid -s UUID -o value {{ avalanchego_nvme_device.stdout }}"
  register: avalanchego_nvme_uuid
  changed_when: false
  when: avalanchego_nvme_device.stdout | length > 0

- name: Assert NVMe filesystem has a UUID
  ansible.builtin.assert:
    that:
      - avalanchego_nvme_uuid.stdout | trim | length > 0
    fail_msg: "Could not read filesystem UUID from {{ avalanchego_nvme_device.stdout }} - refusing to write an fstab entry by raw device name"
  when: avalanchego_nvme_device.stdout | length > 0

- name: Mount NVMe device by UUID
  ansible.posix.mount:
    path: "{{ avalanchego_data_dir }}"
    src: "UUID={{ avalanchego_nvme_uuid.stdout | trim }}"
    fstype: ext4
    opts: defaults,noatime,nodiratime,discard,nofail
    state: mounted
  when: avalanchego_nvme_device.stdout | length > 0

# Re-run case: the device is already mounted (so the detection above finds
# nothing), but an older deploy may have written a raw /dev/nvme* fstab entry
# without nofail. Migrate it to UUID + nofail in place.
- name: Find existing data dir mount (fstab migration check)
  ansible.builtin.set_fact:
    avalanchego_existing_data_mount: >-
      {{ ansible_facts.mounts | default([])
         | selectattr('mount', 'equalto', avalanchego_data_dir)
         | list | first | default({}) }}
  when: avalanchego_nvme_device.stdout | length == 0

- name: Migrate existing fstab entry to UUID + nofail
  when:
    - avalanchego_nvme_device.stdout | length == 0
    - (avalanchego_existing_data_mount.device | default('')) is match('/dev/nvme')
  block:
    - name: Read filesystem UUID of mounted data device
      ansible.builtin.command: "blkid -s UUID -o value {{ avalanchego_existing_data_mount.device }}"
      register: avalanchego_mounted_uuid
      changed_when: false

    - name: Update fstab entry to UUID with nofail
      ansible.posix.mount:
        path: "{{ avalanchego_data_dir }}"
        src: "UUID={{ avalanchego_mounted_uuid.stdout | trim }}"
        fstype: "{{ avalanchego_existing_data_mount.fstype | default('ext4') }}"
        opts: defaults,noatime,nodiratime,discard,nofail
        state: mounted
      when: avalanchego_mounted_uuid.stdout | trim | length > 0

- name: Set ownership of mounted filesystem
  ansible.builtin.file:
    path: "{{ avalanchego_data_dir }}"
    owner: "{{ avalanchego_user }}"
    group: "{{ avalanchego_group }}"
    mode: "0755"
    state: directory
  when: avalanchego_nvme_device.stdout | length > 0
