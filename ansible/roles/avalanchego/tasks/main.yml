---
# Avalanchego installation and configuration

# Create user/group FIRST (needed for NVMe ownership)
- name: Create avalanche group
  group:
    name: "{{ avalanchego_group }}"
    system: yes

- name: Create avalanche user
  user:
    name: "{{ avalanchego_user }}"
    group: "{{ avalanchego_group }}"
    system: yes
    shell: /bin/false
    home: /home/{{ avalanchego_user }}
    create_home: yes

- name: Create staking directory for auto-generated keys
  file:
    path: "/home/{{ avalanchego_user }}/.avalanchego/staking"
    state: directory
    owner: "{{ avalanchego_user }}"
    group: "{{ avalanchego_group }}"
    mode: "0700"

# Mount local NVMe if available (AWS instance store, GCP local SSD, Azure Lsv3)
# This mounts to avalanchego_data_dir (/var/lib/avalanchego)
- name: Setup NVMe storage
  include_tasks: nvme.yml
  when: use_local_nvme | default(true)

# Create directories (data_dir may already be a mount point from NVMe)
- name: Create directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ avalanchego_user }}"
    group: "{{ avalanchego_group }}"
    mode: "0755"
  loop:
    - "{{ avalanchego_data_dir }}"
    - "{{ avalanchego_data_dir }}/db"
    - "{{ avalanchego_data_dir }}/staking"
    - "{{ avalanchego_config_dir }}"
    - "{{ avalanchego_log_dir }}"
    - "{{ avalanchego_plugin_dir }}"
    - "{{ avalanchego_config_dir }}/chains"

- name: Download avalanchego
  get_url:
    url: "https://github.com/ava-labs/avalanchego/releases/download/{{ avalanchego_version }}/avalanchego-linux-amd64-{{ avalanchego_version }}.tar.gz"
    dest: /tmp/avalanchego.tar.gz
    mode: "0644"

- name: Extract avalanchego
  unarchive:
    src: /tmp/avalanchego.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Install avalanchego binary
  copy:
    src: "/tmp/avalanchego-{{ avalanchego_version }}/avalanchego"
    dest: /usr/local/bin/avalanchego
    owner: root
    group: root
    mode: "0755"
    remote_src: yes

# subnet-evm is bundled with avalanchego as of v1.12.0+
- name: Check if bundled subnet-evm exists in release
  stat:
    path: "/tmp/avalanchego-{{ avalanchego_version }}/plugins/srEXiWaHuhNyGwPUi444Tu47ZEDwxTWrbQiuD7FmgSAQ6X7Dy"
  register: bundled_subnet_evm

- name: Install bundled subnet-evm plugin
  copy:
    src: "/tmp/avalanchego-{{ avalanchego_version }}/plugins/srEXiWaHuhNyGwPUi444Tu47ZEDwxTWrbQiuD7FmgSAQ6X7Dy"
    dest: "{{ avalanchego_plugin_dir }}/srEXiWaHuhNyGwPUi444Tu47ZEDwxTWrbQiuD7FmgSAQ6X7Dy"
    owner: "{{ avalanchego_user }}"
    group: "{{ avalanchego_group }}"
    mode: "0755"
    remote_src: yes
  when: bundled_subnet_evm.stat.exists

# Fallback for older avalanchego versions that don't bundle subnet-evm
- name: Download subnet-evm plugin (fallback for older versions)
  get_url:
    url: "https://github.com/ava-labs/subnet-evm/releases/download/{{ subnet_evm_version }}/subnet-evm_{{ subnet_evm_version | regex_replace('^v', '') }}_linux_amd64.tar.gz"
    dest: /tmp/subnet-evm.tar.gz
    mode: "0644"
  when: not bundled_subnet_evm.stat.exists and subnet_evm_version is defined

- name: Extract subnet-evm (fallback)
  unarchive:
    src: /tmp/subnet-evm.tar.gz
    dest: /tmp/
    remote_src: yes
  when: not bundled_subnet_evm.stat.exists and subnet_evm_version is defined

- name: Install subnet-evm plugin (fallback)
  copy:
    src: /tmp/subnet-evm
    dest: "{{ avalanchego_plugin_dir }}/srEXiWaHuhNyGwPUi444Tu47ZEDwxTWrbQiuD7FmgSAQ6X7Dy"
    owner: "{{ avalanchego_user }}"
    group: "{{ avalanchego_group }}"
    mode: "0755"
    remote_src: yes
  when: not bundled_subnet_evm.stat.exists and subnet_evm_version is defined

- name: Load custom node config from repo root
  set_fact:
    custom_node_config: "{{ lookup('file', playbook_dir + '/../../' + node_type + '-node-config.json') | from_json }}"
  ignore_errors: yes

- name: Build base node configuration
  set_fact:
    base_node_config:
      network-id: "{{ network_ids[avalanchego_network] }}"
      http-host: "0.0.0.0"
      http-port: "{{ http_port }}"
      staking-port: "{{ staking_port }}"
      http-allowed-hosts: "*"
      api-admin-enabled: "{{ api_admin_enabled }}"
      api-info-enabled: "{{ api_info_enabled }}"
      api-health-enabled: "{{ api_health_enabled }}"
      index-enabled: "{{ index_enabled }}"
      log-level: "{{ log_level }}"
      log-display-level: "{{ log_display_level }}"
      log-dir: "{{ avalanchego_log_dir }}"
      db-dir: "{{ avalanchego_data_dir }}/db"
      plugin-dir: "{{ avalanchego_plugin_dir }}"
      chain-config-dir: "{{ avalanchego_config_dir }}/chains"
      partial-sync-primary-network: "{{ partial_sync_primary_network | default(true) }}"

- name: Add subnet tracking to config
  set_fact:
    base_node_config: "{{ base_node_config | combine({'track-subnets': track_subnets | join(',')}) }}"
  when: track_subnets is defined and track_subnets | length > 0

- name: Add L1 bootstrap info to config
  set_fact:
    base_node_config: "{{ base_node_config | combine({'bootstrap-ids': l1_bootstrap_ids | join(','), 'bootstrap-ips': l1_bootstrap_ips | join(',')}) }}"
  when: l1_bootstrap_ids is defined and l1_bootstrap_ids | length > 0

- name: Merge custom config with base config
  set_fact:
    final_node_config: "{{ base_node_config | combine(custom_node_config | default({})) }}"

- name: Write node configuration
  copy:
    content: "{{ final_node_config | to_nice_json }}"
    dest: "{{ avalanchego_config_dir }}/node.json"
    owner: "{{ avalanchego_user }}"
    group: "{{ avalanchego_group }}"
    mode: "0644"
  notify: Restart avalanchego

- name: Create systemd service
  template:
    src: avalanchego.service.j2
    dest: /etc/systemd/system/avalanchego.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart avalanchego

- name: Enable and start avalanchego
  systemd:
    name: avalanchego
    enabled: yes
    state: started
    daemon_reload: yes

- name: Wait for P-Chain to bootstrap
  uri:
    url: "http://127.0.0.1:{{ http_port }}/ext/info"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      id: 1
      method: "info.isBootstrapped"
      params:
        chain: "P"
    return_content: yes
  register: bootstrap_check
  until: bootstrap_check.status == 200 and (bootstrap_check.json.result.isBootstrapped | default(false))
  retries: 60
  delay: 10

- name: Clean up temp files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/avalanchego.tar.gz
    - "/tmp/avalanchego-{{ avalanchego_version }}"
    - /tmp/subnet-evm.tar.gz
    - /tmp/subnet-evm
  ignore_errors: yes
