---
# Avalanchego installation and configuration

# Create user/group FIRST (needed for NVMe ownership)
- name: Create avalanche group
  ansible.builtin.group:
    name: "{{ avalanchego_group }}"
    system: true

- name: Create avalanche user
  ansible.builtin.user:
    name: "{{ avalanchego_user }}"
    group: "{{ avalanchego_group }}"
    system: true
    shell: /bin/false
    home: /home/{{ avalanchego_user }}
    create_home: true

- name: Create staking directory for auto-generated keys
  ansible.builtin.file:
    path: "/home/{{ avalanchego_user }}/.avalanchego/staking"
    state: directory
    owner: "{{ avalanchego_user }}"
    group: "{{ avalanchego_group }}"
    mode: "0700"

# Mount local NVMe if available (AWS instance store, GCP local SSD, Azure Lsv3)
# This mounts to avalanchego_data_dir (/var/lib/avalanchego)
- name: Setup NVMe storage
  ansible.builtin.include_tasks: nvme.yml
  when: avalanchego_use_local_nvme | default(true)

# Create directories (data_dir may already be a mount point from NVMe)
- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ avalanchego_user }}"
    group: "{{ avalanchego_group }}"
    mode: "0755"
  loop:
    - "{{ avalanchego_data_dir }}"
    - "{{ avalanchego_data_dir }}/db"
    - "{{ avalanchego_data_dir }}/staking"
    - "{{ avalanchego_config_dir }}"
    - "{{ avalanchego_log_dir }}"
    - "{{ avalanchego_plugin_dir }}"
    - "{{ avalanchego_config_dir }}/chains"

- name: Download avalanchego
  ansible.builtin.get_url:
    url: "https://github.com/ava-labs/avalanchego/releases/download/{{ avalanchego_version }}/avalanchego-linux-amd64-{{ avalanchego_version }}.tar.gz"
    dest: /tmp/avalanchego.tar.gz
    mode: "0644"

- name: Extract avalanchego
  ansible.builtin.unarchive:
    src: /tmp/avalanchego.tar.gz
    dest: /tmp/
    remote_src: true

- name: Install avalanchego binary
  ansible.builtin.copy:
    src: "/tmp/avalanchego-{{ avalanchego_version }}/avalanchego"
    dest: /usr/local/bin/avalanchego
    owner: root
    group: root
    mode: "0755"
    remote_src: true

# subnet-evm is bundled with avalanchego as of v1.12.0+
- name: Check if bundled subnet-evm exists in release
  ansible.builtin.stat:
    path: "/tmp/avalanchego-{{ avalanchego_version }}/plugins/srEXiWaHuhNyGwPUi444Tu47ZEDwxTWrbQiuD7FmgSAQ6X7Dy"
  register: avalanchego_bundled_subnet_evm

- name: Install bundled subnet-evm plugin
  ansible.builtin.copy:
    src: "/tmp/avalanchego-{{ avalanchego_version }}/plugins/srEXiWaHuhNyGwPUi444Tu47ZEDwxTWrbQiuD7FmgSAQ6X7Dy"
    dest: "{{ avalanchego_plugin_dir }}/srEXiWaHuhNyGwPUi444Tu47ZEDwxTWrbQiuD7FmgSAQ6X7Dy"
    owner: "{{ avalanchego_user }}"
    group: "{{ avalanchego_group }}"
    mode: "0755"
    remote_src: true
  when: avalanchego_bundled_subnet_evm.stat.exists

# Fallback for older avalanchego versions that don't bundle subnet-evm
- name: Download subnet-evm plugin (fallback for older versions)
  vars:
    subnet_evm_base: "https://github.com/ava-labs/subnet-evm/releases/download"
    subnet_evm_file: "subnet-evm_{{ avalanchego_subnet_evm_version | regex_replace('^v', '') }}_linux_amd64.tar.gz"
  ansible.builtin.get_url:
    url: "{{ subnet_evm_base }}/{{ avalanchego_subnet_evm_version }}/{{ subnet_evm_file }}"
    dest: /tmp/subnet-evm.tar.gz
    mode: "0644"
  when: not avalanchego_bundled_subnet_evm.stat.exists and avalanchego_subnet_evm_version is defined

- name: Extract subnet-evm (fallback)
  ansible.builtin.unarchive:
    src: /tmp/subnet-evm.tar.gz
    dest: /tmp/
    remote_src: true
  when: not avalanchego_bundled_subnet_evm.stat.exists and avalanchego_subnet_evm_version is defined

- name: Install subnet-evm plugin (fallback)
  ansible.builtin.copy:
    src: /tmp/subnet-evm
    dest: "{{ avalanchego_plugin_dir }}/srEXiWaHuhNyGwPUi444Tu47ZEDwxTWrbQiuD7FmgSAQ6X7Dy"
    owner: "{{ avalanchego_user }}"
    group: "{{ avalanchego_group }}"
    mode: "0755"
    remote_src: true
  when: not avalanchego_bundled_subnet_evm.stat.exists and avalanchego_subnet_evm_version is defined

- name: Resolve custom node config path
  ansible.builtin.set_fact:
    avalanchego_custom_node_config_path: >-
      {{
        (playbook_dir + '/../../configs/primary-network/node/' + avalanchego_node_type + '-node-config.json')
        if avalanchego_node_type in ['primary-validator', 'primary-network']
        else
        (playbook_dir + '/../../configs/l1/node/' + avalanchego_node_type + '-node-config.json')
      }}

- name: Load custom node config from repository config directory
  ansible.builtin.set_fact:
    avalanchego_custom_node_config: "{{ lookup('file', avalanchego_custom_node_config_path) | from_json }}"
  failed_when: false

- name: Build base node configuration
  ansible.builtin.set_fact:
    avalanchego_base_node_config:
      network-id: "{{ avalanchego_network_ids[avalanchego_network] }}"
      http-host: "0.0.0.0"
      http-port: "{{ avalanchego_http_port }}"
      staking-port: "{{ avalanchego_staking_port }}"
      http-allowed-hosts: "*"
      api-admin-enabled: "{{ avalanchego_api_admin_enabled }}"
      api-info-enabled: "{{ avalanchego_api_info_enabled }}"
      api-health-enabled: "{{ avalanchego_api_health_enabled }}"
      index-enabled: "{{ avalanchego_index_enabled }}"
      log-level: "{{ avalanchego_log_level }}"
      log-display-level: "{{ avalanchego_log_display_level }}"
      log-dir: "{{ avalanchego_log_dir }}"
      db-dir: "{{ avalanchego_data_dir }}/db"
      plugin-dir: "{{ avalanchego_plugin_dir }}"
      chain-config-dir: "{{ avalanchego_config_dir }}/chains"
      partial-sync-primary-network: "{{ avalanchego_partial_sync_primary_network | default(true) }}"

- name: Add subnet tracking to config
  ansible.builtin.set_fact:
    avalanchego_base_node_config: "{{ avalanchego_base_node_config | combine({'track-subnets': track_subnets | join(',')}) }}"
  when: track_subnets is defined and track_subnets | length > 0

- name: Add L1 bootstrap info to config
  vars:
    bootstrap_config:
      bootstrap-ids: "{{ l1_bootstrap_ids | join(',') }}"
      bootstrap-ips: "{{ l1_bootstrap_ips | join(',') }}"
  ansible.builtin.set_fact:
    avalanchego_base_node_config: "{{ avalanchego_base_node_config | combine(bootstrap_config) }}"
  when: l1_bootstrap_ids is defined and l1_bootstrap_ids | length > 0

- name: Merge custom config with base config
  ansible.builtin.set_fact:
    avalanchego_final_node_config: "{{ avalanchego_base_node_config | combine(avalanchego_custom_node_config | default({})) }}"

- name: Write node configuration
  ansible.builtin.copy:
    content: "{{ avalanchego_final_node_config | to_nice_json }}"
    dest: "{{ avalanchego_config_dir }}/node.json"
    owner: "{{ avalanchego_user }}"
    group: "{{ avalanchego_group }}"
    mode: "0644"
  notify: Restart avalanchego

- name: Create systemd service
  ansible.builtin.template:
    src: avalanchego.service.j2
    dest: /etc/systemd/system/avalanchego.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart avalanchego

- name: Enable and start avalanchego
  ansible.builtin.systemd:
    name: avalanchego
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for P-Chain to bootstrap
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ avalanchego_http_port }}/ext/info"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      id: 1
      method: "info.isBootstrapped"
      params:
        chain: "P"
    return_content: true
  register: avalanchego_bootstrap_check
  until: avalanchego_bootstrap_check.status == 200 and (avalanchego_bootstrap_check.json.result.isBootstrapped | default(false))
  retries: 60
  delay: 10

- name: Clean up temp files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/avalanchego.tar.gz
    - "/tmp/avalanchego-{{ avalanchego_version }}"
    - /tmp/subnet-evm.tar.gz
    - /tmp/subnet-evm
  failed_when: false
