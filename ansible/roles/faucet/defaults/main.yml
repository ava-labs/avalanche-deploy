---
# Faucet defaults

# Faucet container image.
# WARNING: `avaplatform/faucet` does NOT exist on Docker Hub (verified against
# the registry 2026-06) - there is no published official image for
# https://github.com/ava-labs/avalanche-faucet. Build and push your own image
# from that repo and override faucet_image/faucet_image_tag with a specific
# version tag; do not deploy a floating tag to running infrastructure.
faucet_image: avaplatform/faucet
faucet_image_tag: latest

# Port to expose faucet web interface
faucet_port: 8010

# Amount of tokens to dispense per request (in native token units)
faucet_amount: 1

# Rate limit: requests allowed per hour per address
faucet_rate_limit: 1

# RPC host (defaults to the node's ansible_host)
# faucet_rpc_host: localhost
