---
# Faucet Role - Deploy Avalanche Faucet for L1 Chain
#
# This role deploys the official Avalanche Faucet as a Docker container.
# The faucet allows developers to request test tokens on your L1.
#
# Required variables:
#   faucet_chain_id: The L1 chain ID (blockchain ID from create-l1)
#   faucet_evm_chain_id: The EVM chain ID (from genesis file)
#   faucet_private_key: Private key for the faucet wallet (must be funded)
#
# Optional variables:
#   faucet_port: Port to expose faucet (default: 8010)
#   faucet_amount: Amount of tokens to dispense per request (default: 1)
#   faucet_rate_limit: Requests per hour per address (default: 1)

- name: Install Docker dependencies
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Start Docker service
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Create faucet user
  ansible.builtin.user:
    name: faucet
    groups: docker
    shell: /bin/bash
    create_home: true

- name: Create faucet directory
  ansible.builtin.file:
    path: /opt/faucet
    state: directory
    owner: faucet
    group: faucet
    mode: '0755'

- name: Create faucet docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/faucet/docker-compose.yml
    owner: faucet
    group: faucet
    mode: '0644'
  notify: Restart faucet

- name: Create faucet environment file
  ansible.builtin.template:
    src: faucet.env.j2
    dest: /opt/faucet/.env
    owner: faucet
    group: faucet
    mode: '0600'
  no_log: true
  notify: Restart faucet

- name: Create faucet systemd service
  ansible.builtin.template:
    src: faucet.service.j2
    dest: /etc/systemd/system/faucet.service
    mode: '0644'
  notify: Restart faucet

- name: Enable and start faucet
  ansible.builtin.systemd:
    name: faucet
    state: started
    enabled: true
    daemon_reload: true

# Apply any pending env/compose changes now (systemd stop/start = compose
# down + up, which re-reads env files) so the readiness check below validates
# the configuration we just rendered, not a stale running stack
- name: Apply pending faucet restarts
  ansible.builtin.meta: flush_handlers

- name: Wait for faucet to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ faucet_port | default(8010) }}/health"
    method: GET
    status_code: 200
  register: faucet_health
  until: faucet_health.status == 200
  retries: 30
  delay: 5
