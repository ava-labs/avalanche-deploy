---
- name: Create node_exporter user
  ansible.builtin.user:
    name: node_exporter
    shell: /bin/false
    system: true
    create_home: false

- name: Download node_exporter
  vars:
    base_url: "https://github.com/prometheus/node_exporter/releases/download"
    archive: "node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
  ansible.builtin.get_url:
    url: "{{ base_url }}/v{{ node_exporter_version }}/{{ archive }}"
    dest: /tmp/node_exporter.tar.gz
    mode: '0644'

- name: Extract node_exporter
  ansible.builtin.unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp
    remote_src: true

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: '0755'
    remote_src: true

- name: Create systemd service
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: '0644'
  notify: Restart node_exporter

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: true
    daemon_reload: true

- name: Clean up temp files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/node_exporter.tar.gz
    - "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64"
