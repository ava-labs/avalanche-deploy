---
# Safe Multisig Infrastructure Installation Tasks

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - chain_id is defined
      - evm_chain_id is defined
    fail_msg: "chain_id and evm_chain_id must be defined"

# Password generation - ensure consistency across all templates
- name: Check for existing DB password
  ansible.builtin.stat:
    path: "{{ safe_install_dir }}/.db_password"
  register: safe_db_password_file

- name: Read existing DB password
  ansible.builtin.slurp:
    src: "{{ safe_install_dir }}/.db_password"
  register: safe_existing_db_password
  when: safe_db_password_file.stat.exists

- name: Generate new DB password
  ansible.builtin.set_fact:
    safe_db_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
  when: not safe_db_password_file.stat.exists

- name: Use existing DB password
  ansible.builtin.set_fact:
    safe_db_password: "{{ safe_existing_db_password.content | b64decode | trim }}"
  when: safe_db_password_file.stat.exists

- name: Check for existing RabbitMQ password
  ansible.builtin.stat:
    path: "{{ safe_install_dir }}/.rabbitmq_password"
  register: safe_rabbitmq_password_file

- name: Read existing RabbitMQ password
  ansible.builtin.slurp:
    src: "{{ safe_install_dir }}/.rabbitmq_password"
  register: safe_existing_rabbitmq_password
  when: safe_rabbitmq_password_file.stat.exists

- name: Generate new RabbitMQ password
  ansible.builtin.set_fact:
    safe_rabbitmq_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
  when: not safe_rabbitmq_password_file.stat.exists

- name: Use existing RabbitMQ password
  ansible.builtin.set_fact:
    safe_rabbitmq_password: "{{ safe_existing_rabbitmq_password.content | b64decode | trim }}"
  when: safe_rabbitmq_password_file.stat.exists

# Django secret key generation - critical for session security
- name: Check for existing TXS secret key
  ansible.builtin.stat:
    path: "{{ safe_install_dir }}/.txs_secret_key"
  register: safe_txs_secret_file

- name: Read existing TXS secret key
  ansible.builtin.slurp:
    src: "{{ safe_install_dir }}/.txs_secret_key"
  register: safe_existing_txs_secret
  when: safe_txs_secret_file.stat.exists

- name: Generate new TXS secret key
  ansible.builtin.set_fact:
    safe_txs_secret_key: "{{ lookup('password', '/dev/null length=50 chars=ascii_letters,digits') }}"
  when: not safe_txs_secret_file.stat.exists and (safe_txs_secret_key == "" or safe_txs_secret_key is not defined)

- name: Use existing TXS secret key
  ansible.builtin.set_fact:
    safe_txs_secret_key: "{{ safe_existing_txs_secret.content | b64decode | trim }}"
  when: safe_txs_secret_file.stat.exists

- name: Check for existing CFG secret key
  ansible.builtin.stat:
    path: "{{ safe_install_dir }}/.cfg_secret_key"
  register: safe_cfg_secret_file

- name: Read existing CFG secret key
  ansible.builtin.slurp:
    src: "{{ safe_install_dir }}/.cfg_secret_key"
  register: safe_existing_cfg_secret
  when: safe_cfg_secret_file.stat.exists

- name: Generate new CFG secret key
  ansible.builtin.set_fact:
    safe_cfg_secret_key: "{{ lookup('password', '/dev/null length=50 chars=ascii_letters,digits') }}"
  when: not safe_cfg_secret_file.stat.exists and (safe_cfg_secret_key == "" or safe_cfg_secret_key is not defined)

- name: Use existing CFG secret key
  ansible.builtin.set_fact:
    safe_cfg_secret_key: "{{ safe_existing_cfg_secret.content | b64decode | trim }}"
  when: safe_cfg_secret_file.stat.exists

# Webhook token generation for CGW <-> Config Service
- name: Check for existing webhook token
  ansible.builtin.stat:
    path: "{{ safe_install_dir }}/.webhook_token"
  register: safe_webhook_token_file

- name: Read existing webhook token
  ansible.builtin.slurp:
    src: "{{ safe_install_dir }}/.webhook_token"
  register: safe_existing_webhook_token
  when: safe_webhook_token_file.stat.exists

- name: Generate new webhook token
  ansible.builtin.set_fact:
    safe_webhook_token: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
  when: not safe_webhook_token_file.stat.exists and (safe_webhook_token == "" or safe_webhook_token is not defined)

- name: Use existing webhook token
  ansible.builtin.set_fact:
    safe_webhook_token: "{{ safe_existing_webhook_token.content | b64decode | trim }}"
  when: safe_webhook_token_file.stat.exists

- name: Check if Docker is installed
  ansible.builtin.command: docker --version
  register: safe_docker_check
  changed_when: false
  failed_when: false

- name: Install Docker (if not present)
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-v2
    state: present
    update_cache: true
  when: safe_docker_check.rc != 0

- name: Install nginx and pip
  ansible.builtin.apt:
    name:
      - nginx
      - python3-pip
    state: present
    update_cache: true

- name: Ensure Docker service is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Create Safe directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ safe_install_dir }}"
    - "{{ safe_data_dir }}"
    - "{{ safe_data_dir }}/postgres-txs"
    - "{{ safe_data_dir }}/postgres-cfg"
    - "{{ safe_data_dir }}/postgres-cgw"
    - "{{ safe_data_dir }}/redis"
    - "{{ safe_data_dir }}/rabbitmq"
    - "{{ safe_logs_dir }}"
    - "{{ safe_install_dir }}/nginx"
    - "{{ safe_install_dir }}/init"

- name: Generate DB password file
  ansible.builtin.copy:
    content: "{{ safe_db_password }}"
    dest: "{{ safe_install_dir }}/.db_password"
    mode: '0600'

- name: Generate RabbitMQ password file
  ansible.builtin.copy:
    content: "{{ safe_rabbitmq_password }}"
    dest: "{{ safe_install_dir }}/.rabbitmq_password"
    mode: '0600'

- name: Save TXS secret key
  ansible.builtin.copy:
    content: "{{ safe_txs_secret_key }}"
    dest: "{{ safe_install_dir }}/.txs_secret_key"
    mode: '0600'

- name: Save CFG secret key
  ansible.builtin.copy:
    content: "{{ safe_cfg_secret_key }}"
    dest: "{{ safe_install_dir }}/.cfg_secret_key"
    mode: '0600'

- name: Save webhook token
  ansible.builtin.copy:
    content: "{{ safe_webhook_token }}"
    dest: "{{ safe_install_dir }}/.webhook_token"
    mode: '0600'

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ safe_install_dir }}/docker-compose.yml"
    mode: '0644'
  notify: Restart safe services

- name: Template Transaction Service environment
  ansible.builtin.template:
    src: txs.env.j2
    dest: "{{ safe_install_dir }}/txs.env"
    mode: '0600'
  notify: Restart safe services

- name: Template Config Service environment
  ansible.builtin.template:
    src: cfg.env.j2
    dest: "{{ safe_install_dir }}/cfg.env"
    mode: '0600'
  notify: Restart safe services

- name: Template Client Gateway environment
  ansible.builtin.template:
    src: cgw.env.j2
    dest: "{{ safe_install_dir }}/cgw.env"
    mode: '0600'
  notify: Restart safe services

- name: Template UI environment
  ansible.builtin.template:
    src: ui.env.j2
    dest: "{{ safe_install_dir }}/ui.env"
    mode: '0600'
  notify: Restart safe services

# Build Safe UI Docker image with custom chain support
# Instead of patching minified JS after build, we patch the @safe-global/safe-deployments
# source JSON files BEFORE build (like AshAvalanche does with their safe-deployments fork).
# This ensures the protocol-kit can fully resolve contract addresses for the custom chain.
- name: Copy safe-deployments patch script
  ansible.builtin.copy:
    src: patch-safe-deployments.js
    dest: "{{ safe_install_dir }}/patch-safe-deployments.js"
    mode: '0644'

- name: Check if patched Safe UI image exists and is correctly built
  ansible.builtin.shell: |
    set -eo pipefail
    # Check if image exists
    if ! docker images -q safe-ui-patched:{{ evm_chain_id }} | grep -q .; then
      echo "NEEDS_BUILD"
      exit 0
    fi
    # Verify the image has the chain ID in the JS bundles
    if ! docker run --rm --entrypoint="" safe-ui-patched:{{ evm_chain_id }} \
      sh -c 'grep -rl "{{ evm_chain_id }}" /usr/share/nginx/html/_next/static/chunks/*.js 2>/dev/null | head -1' | grep -q .; then
      echo "NEEDS_BUILD"
      exit 0
    fi
    # Verify the gateway URL points to our CGW (not safe-client.safe.global fallback)
    if docker run --rm --entrypoint="" safe-ui-patched:{{ evm_chain_id }} \
      sh -c 'grep -rl "safe-client.safe.global" /usr/share/nginx/html/_next/static/chunks/*.js 2>/dev/null | head -1' | grep -q .; then
      echo "NEEDS_BUILD"
      exit 0
    fi
    echo "OK"
  args:
    executable: /bin/bash
  register: safe_patched_ui_check
  changed_when: false
  failed_when: false

- name: Build patched Safe UI image
  ansible.builtin.shell: |
    set -eo pipefail
    # Clean up any previous attempts
    rm -rf /tmp/safe-ui-patched /tmp/safe-ui-scripts
    docker rm -f safe-ui-build 2>/dev/null || true

    # Pull the official image
    docker pull safeglobal/safe-wallet-web:{{ safe_ui_version }}

    # Copy patch script to a volume mount directory
    mkdir -p /tmp/safe-ui-scripts
    cp {{ safe_install_dir }}/patch-safe-deployments.js /tmp/safe-ui-scripts/

    # Build static files inside the container:
    # 1. Write .env.production (Next.js reads this for DefinePlugin inlining of NEXT_PUBLIC_* vars)
    # 2. Patch safe-deployments to add our chain to networkAddresses (pre-build)
    # 3. Run yarn build
    # NOTE: Using .env.production file instead of -e flags because Next.js DefinePlugin
    # does not inline process.env.NEXT_PUBLIC_* from shell env vars in this Docker image.
    {% set safe_host = safe_domain if safe_domain else ansible_host %}
    cat > /tmp/safe-ui-scripts/env.production << ENVEOF
    NEXT_PUBLIC_GATEWAY_URL_PRODUCTION=https://{{ safe_host }}/cgw
    NEXT_PUBLIC_GATEWAY_URL_STAGING=https://{{ safe_host }}/cgw
    NEXT_PUBLIC_IS_PRODUCTION=true
    NEXT_PUBLIC_SAFE_VERSION=1.4.1
    ENVEOF
    # Strip leading whitespace from env file (heredoc preserves indentation)
    sed -i 's/^[[:space:]]*//' /tmp/safe-ui-scripts/env.production

    echo "Building Safe UI with chain {{ evm_chain_id }} support (this may take a few minutes)..."
    docker run --name safe-ui-build \
      -v /tmp/safe-ui-scripts:/scripts:ro \
      --entrypoint="" \
      safeglobal/safe-wallet-web:{{ safe_ui_version }} \
      sh -c "cp /scripts/env.production /app/.env.production && node /scripts/patch-safe-deployments.js {{ evm_chain_id }} && yarn build"

    # Extract the built files
    docker cp safe-ui-build:/app/out /tmp/safe-ui-patched
    docker rm safe-ui-build
    rm -rf /tmp/safe-ui-scripts

    # Verify the chain ID was compiled into the JS bundles
    if ! grep -rl '{{ evm_chain_id }}' /tmp/safe-ui-patched/_next/static/chunks/*.js >/dev/null 2>&1; then
      echo "ERROR: Chain {{ evm_chain_id }} not found in built JS bundles. Patch may have failed." >&2
      rm -rf /tmp/safe-ui-patched
      exit 1
    fi
    echo "Verified: chain {{ evm_chain_id }} found in built JS bundles"

    # Verify the gateway URL was compiled in (not falling back to safe-client.safe.global)
    if grep -rl 'safe-client.safe.global' /tmp/safe-ui-patched/_next/static/chunks/*.js >/dev/null 2>&1; then
      echo "ERROR: Gateway URL still points to safe-client.safe.global. .env.production may not have been applied." >&2
      rm -rf /tmp/safe-ui-patched
      exit 1
    fi
    echo "Verified: gateway URL does not contain safe-client.safe.global fallback"

    # Build nginx image with the patched build output
    cat > /tmp/Dockerfile.safe-ui << 'EOF'
    FROM nginx:alpine
    COPY safe-ui-patched /usr/share/nginx/html
    RUN echo 'server { \
      listen 8080; \
      root /usr/share/nginx/html; \
      index index.html; \
      location / { try_files $uri $uri.html $uri/ /index.html; } \
      location /_next { alias /usr/share/nginx/html/_next; expires 1y; add_header Cache-Control "public, immutable"; } \
    }' > /etc/nginx/conf.d/default.conf
    EXPOSE 8080
    CMD ["nginx", "-g", "daemon off;"]
    EOF

    cd /tmp && docker build -f Dockerfile.safe-ui -t safe-ui-patched:{{ evm_chain_id }} .
    rm -rf /tmp/safe-ui-patched /tmp/Dockerfile.safe-ui
  args:
    executable: /bin/bash
  when: safe_patched_ui_check.stdout | trim == "NEEDS_BUILD"
  register: safe_build_ui
  timeout: 1200
  changed_when: true

- name: Create SSL directory
  ansible.builtin.file:
    path: /etc/nginx/ssl
    state: directory
    mode: '0700'

# --- Let's Encrypt SSL (when safe_use_letsencrypt is true) ---

- name: Validate Let's Encrypt configuration
  ansible.builtin.assert:
    that:
      - safe_domain != ""
      - safe_letsencrypt_email != ""
    fail_msg: "safe_domain and safe_letsencrypt_email are required when safe_use_letsencrypt is true"
  when: safe_use_letsencrypt | bool

- name: Install certbot
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present
    update_cache: true
  when: safe_use_letsencrypt | bool

- name: Check if Let's Encrypt certificate exists
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ safe_domain }}/fullchain.pem"
  register: safe_letsencrypt_cert
  when: safe_use_letsencrypt | bool

- name: Stop nginx for initial certificate request
  ansible.builtin.systemd:
    name: nginx
    state: stopped
  when:
    - safe_use_letsencrypt | bool
    - not safe_letsencrypt_cert.stat.exists | default(true)
  failed_when: false

- name: Obtain Let's Encrypt certificate
  ansible.builtin.command:
    cmd: >
      certbot certonly --standalone
      --non-interactive
      --agree-tos
      --email {{ safe_letsencrypt_email }}
      --domain {{ safe_domain }}
  when:
    - safe_use_letsencrypt | bool
    - not safe_letsencrypt_cert.stat.exists | default(true)
  register: safe_certbot_result
  changed_when: safe_certbot_result.rc == 0

- name: Create symlinks for Let's Encrypt certificates
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - { src: "/etc/letsencrypt/live/{{ safe_domain }}/fullchain.pem", dest: "/etc/nginx/ssl/safe.crt" }
    - { src: "/etc/letsencrypt/live/{{ safe_domain }}/privkey.pem", dest: "/etc/nginx/ssl/safe.key" }
  when: safe_use_letsencrypt | bool
  notify: Reload nginx

- name: Setup certbot auto-renewal cron job
  ansible.builtin.cron:
    name: "Certbot renewal"
    minute: "0"
    hour: "3"
    job: "certbot renew --quiet --post-hook 'systemctl reload nginx'"
    user: root
  when: safe_use_letsencrypt | bool

# --- Self-signed SSL (when safe_use_letsencrypt is false) ---

- name: Check if self-signed SSL certificate exists
  ansible.builtin.stat:
    path: /etc/nginx/ssl/safe.crt
  register: safe_ssl_cert
  when: not (safe_use_letsencrypt | bool)

- name: Generate self-signed SSL certificate
  ansible.builtin.command:
    cmd: >
      openssl req -x509 -nodes -days 365 -newkey rsa:2048
      -keyout /etc/nginx/ssl/safe.key
      -out /etc/nginx/ssl/safe.crt
      -subj "/C=US/ST=State/L=City/O=Organization/CN={{ safe_domain | default(ansible_host) }}"
  when:
    - not (safe_use_letsencrypt | bool)
    - not safe_ssl_cert.stat.exists | default(true)
  notify: Reload nginx
  changed_when: true

- name: Set SSL key permissions
  ansible.builtin.file:
    path: /etc/nginx/ssl/safe.key
    mode: '0600'
  when:
    - not (safe_use_letsencrypt | bool)
    - not safe_ssl_cert.stat.exists | default(true)

- name: Template nginx configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ safe_install_dir }}/nginx/safe.conf"
    mode: '0644'
  notify: Reload nginx

- name: Copy contract initialization script
  ansible.builtin.copy:
    src: init-contracts.py
    dest: "{{ safe_install_dir }}/init/init-contracts.py"
    mode: '0755'

- name: Copy config service initialization script
  ansible.builtin.copy:
    src: init-cfg-chain.py
    dest: "{{ safe_install_dir }}/init/init-cfg-chain.py"
    mode: '0755'

- name: Template systemd service
  ansible.builtin.template:
    src: safe.service.j2
    dest: /etc/systemd/system/safe.service
    mode: '0644'
  notify: Restart safe services

- name: Enable nginx site
  ansible.builtin.file:
    src: "{{ safe_install_dir }}/nginx/safe.conf"
    dest: /etc/nginx/sites-enabled/safe.conf
    state: link
  notify: Reload nginx

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Start Safe services
  ansible.builtin.systemd:
    name: safe
    state: started
    enabled: true
    daemon_reload: true

- name: Ensure nginx is running
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true

# Deploy Safe contracts via Singleton Factory (if deploy key is provided)
- name: Create contract deployment directory
  ansible.builtin.file:
    path: "{{ safe_install_dir }}/deploy-contracts"
    state: directory
    mode: '0755'
  when: safe_deploy_key is defined and safe_deploy_key != ""

- name: Copy contract deployment script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/safe/deploy-contracts.sh"
    dest: "{{ safe_install_dir }}/deploy-contracts/deploy-contracts.sh"
    mode: '0755'
  when: safe_deploy_key is defined and safe_deploy_key != ""

- name: Copy contract initcodes
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/safe/initcodes/"
    dest: "{{ safe_install_dir }}/deploy-contracts/initcodes/"
    mode: '0644'
  when: safe_deploy_key is defined and safe_deploy_key != ""

- name: Check if cast (Foundry) is available
  ansible.builtin.command: which cast
  register: safe_cast_check
  changed_when: false
  failed_when: false
  when: safe_deploy_key is defined and safe_deploy_key != ""

- name: Install Foundry (if cast not available)
  ansible.builtin.shell: |
    curl -L https://foundry.paradigm.xyz | bash
    export PATH="$HOME/.foundry/bin:$PATH"
    foundryup
  args:
    executable: /bin/bash
  when:
    - safe_deploy_key is defined and safe_deploy_key != ""
    - safe_cast_check.rc != 0
  changed_when: true

- name: Deploy Safe contracts via Singleton Factory
  ansible.builtin.shell: |
    export PATH="$HOME/.foundry/bin:$PATH"
    cd {{ safe_install_dir }}/deploy-contracts
    RPC_URL="{{ safe_rpc_url }}" \
    PRIVATE_KEY="{{ safe_deploy_key }}" \
    ./deploy-contracts.sh
  args:
    executable: /bin/bash
  register: safe_contract_deploy
  when: safe_deploy_key is defined and safe_deploy_key != ""
  changed_when: "'deployed' in safe_contract_deploy.stdout"

- name: Show contract deployment result
  ansible.builtin.debug:
    msg: "{{ safe_contract_deploy.stdout_lines | default(['Contract deployment skipped']) }}"
  when: safe_deploy_key is defined and safe_deploy_key != ""

- name: Wait for PostgreSQL (TXS) to be healthy
  ansible.builtin.command:
    cmd: docker exec safe-postgres-txs pg_isready -U {{ safe_db_user }} -d {{ safe_txs_db_name }}
  register: safe_pg_txs_ready
  until: safe_pg_txs_ready.rc == 0
  retries: 30
  delay: 5
  changed_when: false

- name: Wait for PostgreSQL (CFG) to be healthy
  ansible.builtin.command:
    cmd: docker exec safe-postgres-cfg pg_isready -U {{ safe_db_user }} -d {{ safe_cfg_db_name }}
  register: safe_pg_cfg_ready
  until: safe_pg_cfg_ready.rc == 0
  retries: 30
  delay: 5
  changed_when: false

- name: Stop TXS web container for migrations
  ansible.builtin.command:
    cmd: docker stop safe-txs-web
  failed_when: false
  changed_when: false

- name: Run Transaction Service database migrations
  ansible.builtin.command:
    cmd: >
      docker run --rm
      --network safe-network
      --add-host=host.docker.internal:host-gateway
      --env-file {{ safe_install_dir }}/txs.env
      safeglobal/safe-transaction-service:{{ safe_txs_version }}
      python manage.py migrate --noinput
  register: safe_txs_migrate
  changed_when: "'Applying' in safe_txs_migrate.stdout"
  retries: 3
  delay: 10

- name: Stop CFG container for migrations
  ansible.builtin.command:
    cmd: docker stop safe-cfg
  failed_when: false
  changed_when: false

- name: Run Config Service database migrations
  ansible.builtin.command:
    cmd: >
      docker run --rm
      --network safe-network
      --env-file {{ safe_install_dir }}/cfg.env
      -e DOCKER_NGINX_VOLUME_ROOT=/nginx
      -e GUNICORN_BIND_SOCKET=/dev/null
      -e GUNICORN_BIND_PORT=8000
      safeglobal/safe-config-service:{{ safe_cfg_version }}
      python manage.py migrate --noinput
  register: safe_cfg_migrate
  changed_when: "'Applying' in safe_cfg_migrate.stdout"
  failed_when: "safe_cfg_migrate.rc != 0 and 'No migrations to apply' not in safe_cfg_migrate.stdout"
  retries: 3
  delay: 10

- name: Restart all Safe services after migrations
  ansible.builtin.systemd:
    name: safe
    state: restarted
  changed_when: true

- name: Wait for Transaction Service to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ safe_txs_port }}/api/v1/about/"
    method: GET
    status_code: 200
  register: safe_txs_health
  until: safe_txs_health.status == 200
  retries: 30
  delay: 10

- name: Wait for Config Service to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ safe_cfg_port }}/api/v1/about/"
    method: GET
    status_code: 200
  register: safe_cfg_health
  until: safe_cfg_health.status == 200
  retries: 30
  delay: 10

- name: Wait for Client Gateway to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ safe_cgw_port }}/about"
    method: GET
    status_code: 200
  register: safe_cgw_health
  until: safe_cgw_health.status == 200
  retries: 30
  delay: 10

# Set host variable for URLs (use domain if configured, otherwise IP)
- name: Set safe_host for URL configuration
  ansible.builtin.set_fact:
    safe_host: "{{ safe_domain if safe_domain else ansible_host }}"

# Auto-configure chain in Config Service database
- name: Initialize chain in Config Service
  ansible.builtin.command:
    cmd: >
      docker exec safe-cfg python /init/init-cfg-chain.py
      --chain-id "{{ evm_chain_id }}"
      --chain-name "{{ safe_chain_name }}"
      --short-name "{{ safe_chain_short_name }}"
      --rpc-url "https://{{ safe_host }}/rpc"
      --block-explorer-url "https://{{ safe_host }}:4443"
      --currency-name "{{ safe_native_currency_name }}"
      --currency-symbol "{{ safe_native_currency_symbol }}"
      --txs-url "http://safe-txs-web:8888"
      --l2 "{{ safe_use_l2 | lower }}"
      --gas-price "{{ safe_gas_price_wei }}"
      --safe-singleton "{{ safe_contracts.safe_singleton }}"
      --proxy-factory "{{ safe_contracts.proxy_factory }}"
      --multi-send "{{ safe_contracts.multi_send }}"
      --multi-send-call-only "{{ safe_contracts.multi_send_call_only }}"
      --fallback-handler "{{ safe_contracts.fallback_handler }}"
      --create-call "{{ safe_contracts.create_call }}"
      --sign-message-lib "{{ safe_contracts.sign_message_lib }}"
      --simulate-tx-accessor "{{ safe_contracts.simulate_tx_accessor }}"
  register: safe_cfg_init
  changed_when: "'Created chain' in safe_cfg_init.stdout"
  failed_when: safe_cfg_init.rc != 0 and 'already exists' not in safe_cfg_init.stdout

# Auto-configure contracts in Transaction Service database
# Must run via manage.py shell to inherit Django environment
- name: Initialize contracts in Transaction Service
  ansible.builtin.shell:
    cmd: |
      docker exec safe-txs-web python manage.py shell -c "
      exec(open('/init/init-contracts.py').read())
      main(
          '{{ safe_contracts.safe_singleton }}',
          '{{ safe_contracts.proxy_factory }}',
          '{{ safe_contracts.multi_send }}',
          '{{ safe_contracts.multi_send_call_only }}',
          '{{ safe_contracts.fallback_handler }}',
          '{{ safe_contracts.create_call }}',
          '{{ safe_contracts.sign_message_lib }}',
          '{{ safe_contracts.simulate_tx_accessor }}',
          {{ safe_use_l2 | ternary('True', 'False') }}
      )
      "
  register: safe_txs_init
  changed_when: "'Created' in safe_txs_init.stdout"
  failed_when: safe_txs_init.rc != 0

# Setup Celery beat periodic tasks for indexing
# TXS uses DatabaseScheduler, so periodic tasks must be created in the DB
- name: Setup indexing periodic tasks
  ansible.builtin.shell:
    cmd: |
      docker exec safe-txs-web python manage.py shell -c "
      from django_celery_beat.models import PeriodicTask, IntervalSchedule
      every_10s, _ = IntervalSchedule.objects.get_or_create(every=10, period=IntervalSchedule.SECONDS)
      every_30s, _ = IntervalSchedule.objects.get_or_create(every=30, period=IntervalSchedule.SECONDS)
      every_60s, _ = IntervalSchedule.objects.get_or_create(every=60, period=IntervalSchedule.SECONDS)
      every_5m, _ = IntervalSchedule.objects.get_or_create(every=5, period=IntervalSchedule.MINUTES)
      every_1h, _ = IntervalSchedule.objects.get_or_create(every=1, period=IntervalSchedule.HOURS)
      tasks = [
          ('index_internal_txs', 'safe_transaction_service.history.tasks.index_internal_txs_task', every_10s),
          ('index_safe_events', 'safe_transaction_service.history.tasks.index_safe_events_task', every_10s),
          ('index_erc20_events', 'safe_transaction_service.history.tasks.index_erc20_events_task', every_10s),
          ('index_new_proxies', 'safe_transaction_service.history.tasks.index_new_proxies_task', every_30s),
          ('check_reorgs', 'safe_transaction_service.history.tasks.check_reorgs_task', every_60s),
          ('process_decoded_internal_txs', 'safe_transaction_service.history.tasks.process_decoded_internal_txs_task', every_30s),
          ('reindex_master_copies', 'safe_transaction_service.history.tasks.reindex_master_copies_task', every_1h),
          ('check_sync_status', 'safe_transaction_service.history.tasks.check_sync_status_task', every_5m),
      ]
      created_count = 0
      for name, task, interval in tasks:
          obj, created = PeriodicTask.objects.update_or_create(
              name=name, defaults={'task': task, 'interval': interval, 'enabled': True}
          )
          if created:
              created_count += 1
      print('Created ' + str(created_count) + ' periodic tasks, total: ' + str(PeriodicTask.objects.count()))
      "
  register: safe_periodic_tasks
  changed_when: "'Created' in safe_periodic_tasks.stdout and 'Created 0' not in safe_periodic_tasks.stdout"

# Validation - ensure chain and contracts are properly registered
- name: Verify chain registered in Config Service
  ansible.builtin.uri:
    url: "http://localhost:{{ safe_cfg_port }}/api/v1/chains/{{ evm_chain_id }}/"
    method: GET
    status_code: 200
  register: safe_chain_check
  retries: 3
  delay: 5
  until: safe_chain_check.status == 200

- name: Verify contracts registered in Transaction Service
  ansible.builtin.uri:
    url: "http://localhost:{{ safe_txs_port }}/api/v1/about/singletons/"
    method: GET
    status_code: 200
  register: safe_singletons_check
  retries: 3
  delay: 5
  until: safe_singletons_check.status == 200

- name: Check if Safe singleton is registered
  ansible.builtin.assert:
    that:
      - "safe_contracts.safe_singleton | lower in (safe_singletons_check.json | map(attribute='address') | list | map('lower') | list)"
    fail_msg: "Safe singleton {{ safe_contracts.safe_singleton }} not found in registered singletons"
    success_msg: "Safe singleton registered successfully"

- name: Set safe_host variable
  ansible.builtin.set_fact:
    safe_host: "{{ safe_domain if safe_domain else ansible_host }}"

- name: Display Safe URLs
  ansible.builtin.debug:
    msg: |
      Safe Multisig Infrastructure Deployed Successfully!

      Web UI (HTTPS):      https://{{ safe_host }}/
      Block Explorer:      https://{{ safe_host }}:4443/
      RPC (HTTPS):         https://{{ safe_host }}/rpc

      Internal Services (for debugging):
        Transaction Service: http://{{ ansible_host }}:{{ safe_txs_port }}/api/v1/about/
        Config Service:      http://{{ ansible_host }}:{{ safe_cfg_port }}/api/v1/about/
        Client Gateway:      http://{{ ansible_host }}:{{ safe_cgw_port }}/about

      {% if safe_use_letsencrypt %}
      SSL: Let's Encrypt certificate for {{ safe_domain }} (auto-renewal configured)
      {% else %}
      SSL: Self-signed certificate - browser will show security warning.
      {% endif %}

      Chain ID: {{ evm_chain_id }}
      RPC (direct): http://{{ ansible_host }}:9650/ext/bc/{{ chain_id }}/rpc
