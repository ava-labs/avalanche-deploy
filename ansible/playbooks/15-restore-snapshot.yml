---
# Restore Database from Snapshot
#
# Downloads and restores an avalanchego database snapshot from S3.
# Use this to quickly bootstrap new nodes instead of state sync.
#
# Usage:
#   ansible-playbook playbooks/15-restore-snapshot.yml --limit migration-target
#   ansible-playbook playbooks/15-restore-snapshot.yml --limit migration-target -e snapshot_name=mainnet-2025-02
#
# If snapshot_name is not specified, uses 'latest'.
#
# Options:
#   verify_integrity: true  - Download file first, verify SHA256, then extract (slower but safer)
#   verify_integrity: false - Stream directly (faster, default)
#
# Requirements:
#   - S3 bucket with snapshots (created by 14-create-snapshot.yml)
#   - Target node has avalanchego installed but NOT running as validator
#   - Sufficient disk space (~2x snapshot size during extraction, 3x if verify_integrity=true)

- name: Restore Database from Snapshot
  hosts: all
  become: true
  gather_facts: true

  vars:
    snapshot_name: "latest"
    temp_dir: /tmp/snapshot-restore
    db_path: /var/lib/avalanchego/db
    verify_integrity: false

  pre_tasks:
    - name: Verify S3 backup is configured
      ansible.builtin.assert:
        that:
          - staking_keys_bucket is defined
          - staking_keys_bucket != ""
        fail_msg: "S3 backup not configured. Set staking_keys_bucket in inventory."

    - name: Install lz4 compression
      ansible.builtin.apt:
        name: lz4
        state: present

    - name: Check if snapshot exists in S3
      ansible.builtin.command: >
        aws s3 ls s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.tar.lz4
      register: snapshot_exists
      failed_when: false
      changed_when: false

    - name: Fail if snapshot not found
      ansible.builtin.fail:
        msg: |
          Snapshot not found: s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.tar.lz4

          List available snapshots:
            aws s3 ls s3://{{ staking_keys_bucket }}/snapshots/

          Create a snapshot first:
            ansible-playbook playbooks/14-create-snapshot.yml --limit <synced-node>
      when: snapshot_exists.rc != 0

  tasks:
    - name: Get snapshot metadata
      ansible.builtin.command: >
        aws s3 cp s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.json -
      register: snapshot_metadata
      failed_when: false
      changed_when: false

    - name: Parse snapshot metadata
      ansible.builtin.set_fact:
        snapshot_info: "{{ snapshot_metadata.stdout | from_json }}"
      when: snapshot_metadata.rc == 0

    - name: Display snapshot info
      ansible.builtin.debug:
        msg: >-
          Restoring snapshot: {{ snapshot_name }}
          ({{ snapshot_info.created | default('unknown date') }},
          SHA256: {{ snapshot_info.sha256 | default('not available') }})
      when: snapshot_metadata.rc == 0

    - name: Stop avalanchego
      ansible.builtin.systemd:
        name: avalanchego
        state: stopped

    - name: Create temp directory
      ansible.builtin.file:
        path: "{{ temp_dir }}"
        state: directory
        mode: '0755'

    - name: Download checksum file
      ansible.builtin.command: >
        aws s3 cp s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.sha256
        {{ temp_dir }}/{{ snapshot_name }}.sha256
      when: verify_integrity | bool
      register: checksum_download
      failed_when: false
      changed_when: checksum_download.rc == 0

    - name: Check available disk space
      ansible.builtin.shell: set -o pipefail && df -BG {{ db_path | dirname }} | tail -1 | awk '{print $4}' | sed 's/G//'
      args:
        executable: /bin/bash
      register: available_space
      changed_when: false

    - name: Display available space
      ansible.builtin.debug:
        msg: "Available space: {{ available_space.stdout }}GB"

    - name: Remove existing database
      ansible.builtin.file:
        path: "{{ db_path }}"
        state: absent

    - name: Create database directory
      ansible.builtin.file:
        path: "{{ db_path }}"
        state: directory
        owner: avalanche
        group: avalanche
        mode: '0755'

    - name: Download snapshot file (verified mode)
      ansible.builtin.command: >
        aws s3 cp s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.tar.lz4
        {{ temp_dir }}/{{ snapshot_name }}.tar.lz4
      when: verify_integrity | bool
      async: 7200
      poll: 60
      changed_when: true

    - name: Verify snapshot checksum
      ansible.builtin.shell: |
        set -o pipefail
        cd {{ temp_dir }}
        sha256sum -c {{ snapshot_name }}.sha256
      args:
        executable: /bin/bash
      register: checksum_verify
      when: verify_integrity | bool and checksum_download.rc == 0
      changed_when: false

    - name: Fail if checksum verification failed
      ansible.builtin.fail:
        msg: |
          CHECKSUM VERIFICATION FAILED!
          The snapshot file may be corrupted. Do not use this snapshot.
          Expected: {{ lookup('file', temp_dir + '/' + snapshot_name + '.sha256') | default('unknown') }}
          Please try downloading again or use a different snapshot.
      when: verify_integrity | bool and checksum_download.rc == 0 and checksum_verify.rc != 0

    - name: Display checksum verification success
      ansible.builtin.debug:
        msg: "Checksum verified successfully"
      when: verify_integrity | bool and checksum_download.rc == 0 and checksum_verify.rc == 0

    - name: Extract snapshot (verified mode)
      ansible.builtin.shell: |
        set -o pipefail
        lz4 -d {{ temp_dir }}/{{ snapshot_name }}.tar.lz4 | \
          tar xf - -C {{ db_path | dirname }}
      args:
        executable: /bin/bash
      when: verify_integrity | bool
      async: 7200
      poll: 60
      changed_when: true

    - name: Download and extract snapshot (streaming mode)
      ansible.builtin.shell: |
        set -o pipefail
        aws s3 cp s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.tar.lz4 - | \
          lz4 -d | \
          tar xf - -C {{ db_path | dirname }}
      args:
        executable: /bin/bash
      register: restore_result
      when: not (verify_integrity | bool)
      async: 7200  # 2 hour timeout
      poll: 60
      changed_when: true

    - name: Clean up downloaded snapshot file
      ansible.builtin.file:
        path: "{{ temp_dir }}/{{ snapshot_name }}.tar.lz4"
        state: absent
      when: verify_integrity | bool

    - name: Set database ownership
      ansible.builtin.file:
        path: "{{ db_path }}"
        owner: avalanche
        group: avalanche
        recurse: true

    - name: Clean up temp directory
      ansible.builtin.file:
        path: "{{ temp_dir }}"
        state: absent

    - name: Start avalanchego
      ansible.builtin.systemd:
        name: avalanchego
        state: started

    - name: Wait for node to start
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.getNodeID"
        return_content: true
      register: node_info
      until: node_info.status == 200
      retries: 30
      delay: 10

    - name: Display Node ID
      ansible.builtin.debug:
        msg: "Node ID: {{ node_info.json.result.nodeID }}"

    - name: Check P-Chain status
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.isBootstrapped"
          params:
            chain: "P"
        return_content: true
      register: pchain_status
      until: pchain_status.status == 200
      retries: 60
      delay: 10

    - name: Display completion message
      ansible.builtin.debug:
        msg: |

          ============================================
          Snapshot Restored Successfully
          ============================================

          Node ID: {{ node_info.json.result.nodeID }}
          Snapshot: {{ snapshot_name }}
          Integrity: {{ 'Verified' if (verify_integrity | bool) else 'Streaming (not verified)' }}
          {% if snapshot_info is defined and snapshot_info.sha256 is defined %}
          SHA256: {{ snapshot_info.sha256 }}
          {% endif %}

          The node is now catching up from the snapshot.
          This should only take a few minutes to sync recent blocks.

          Check sync status:
            ./scripts/check-primary-sync.sh {{ ansible_host }}

          P-Chain bootstrapped: {{ pchain_status.json.result.isBootstrapped | default(false) }}

          {% if not (verify_integrity | bool) %}
          TIP: For verified restores, use: -e verify_integrity=true
          {% endif %}
          ============================================
