---
# Deploy Blockscout block explorer to a monitoring server
#
# Usage:
#   ansible-playbook -i inventory.yml 04-deploy-blockscout.yml \
#     -e "l1_chain_id=YOUR_CHAIN_ID" \
#     -e "l1_evm_chain_id=12345"
#
# Required variables:
#   l1_chain_id: L1 chain ID (from create-l1 output)
#   l1_evm_chain_id: EVM chain ID (from genesis.json config.chainId)
#
# Optional variables:
#   blockscout_network_name: Display name for your network
#   blockscout_coin_symbol: Token symbol (default: AVAX)

- name: Validate Blockscout deployment inputs
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Validate required variables
      ansible.builtin.fail:
        msg: "Missing required variable: {{ item }}"
      when: vars[item] is not defined or vars[item] == ''
      loop:
        - l1_chain_id
        - l1_evm_chain_id

    - name: Ensure at least one RPC group is available
      ansible.builtin.assert:
        that:
          - (groups['rpc_archive'] | default([]) | length) > 0 or (groups['rpc'] | default([]) | length) > 0
        fail_msg: "Inventory must contain at least one RPC node in group 'rpc_archive' or 'rpc'"

    - name: Select Blockscout target host
      ansible.builtin.set_fact:
        blockscout_target_host: "{{ groups['rpc_archive'][0] if (groups['rpc_archive'] | default([]) | length) > 0 else groups['rpc'][0] }}"

    - name: Show selected Blockscout target
      ansible.builtin.debug:
        msg: "Deploying Blockscout on {{ blockscout_target_host }}"

- name: Deploy Blockscout Block Explorer
  hosts: rpc_archive[0]:rpc[0]
  become: true
  vars:
    # Override these in your inventory or via -e
    blockscout_network_name: "{{ l1_name | default('Avalanche L1') }}"
    blockscout_network_short_name: "{{ l1_short_name | default('AVAX-L1') }}"
    blockscout_chain_id: "{{ l1_chain_id }}"
    blockscout_evm_chain_id: "{{ l1_evm_chain_id }}"
    blockscout_coin_symbol: "{{ coin_symbol | default('AVAX') }}"
    blockscout_coin_name: "{{ coin_name | default('Avalanche') }}"
    # Use host.docker.internal which maps to the host machine from inside Docker
    blockscout_rpc_url: "{{ rpc_url | default('http://host.docker.internal:9650/ext/bc/' + (l1_chain_id | string) + '/rpc') }}"
    blockscout_ws_url: "{{ ws_url | default('ws://host.docker.internal:9650/ext/bc/' + (l1_chain_id | string) + '/ws') }}"

  pre_tasks:
    - name: Determine whether this host should run Blockscout deployment
      ansible.builtin.set_fact:
        deploy_blockscout_here: "{{ inventory_hostname == hostvars['localhost']['blockscout_target_host'] }}"

  roles:
    - role: blockscout
      when: deploy_blockscout_here

  post_tasks:
    - name: Display access information
      ansible.builtin.debug:
        msg: |
          ============================================
          Blockscout Block Explorer Deployed!
          ============================================

          Frontend URL: http://{{ ansible_host }}:{{ blockscout_frontend_port | default(4001) }}
          API URL: http://{{ ansible_host }}:{{ blockscout_http_port | default(4000) }}/api

          Network: {{ blockscout_network_name }}
          Chain ID: {{ blockscout_chain_id }}
          RPC: {{ blockscout_rpc_url }}

          Note: Initial sync may take some time depending
          on the number of blocks in your chain.
          ============================================
      when: deploy_blockscout_here
