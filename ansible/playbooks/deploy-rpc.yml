---
# Deploy Avalanche RPC nodes
#
# Usage:
#   ansible-playbook playbooks/deploy-rpc.yml

- name: Deploy Avalanche RPC Nodes
  hosts: rpc
  become: true
  gather_facts: true

  vars:
    avalanchego_version: "v1.14.1"
    subnet_evm_version: "v0.8.0"
    network: "{{ lookup('env', 'AVALANCHE_NETWORK') | default('fuji', true) }}"
    data_dir: /var/lib/avalanchego
    config_dir: /etc/avalanchego
    log_dir: /var/log/avalanchego

  roles:
    - role: avalanchego
      vars:
        node_type: rpc
        avalanchego_network: "{{ network }}"

  post_tasks:
    - name: Verify RPC endpoint
      uri:
        url: "http://127.0.0.1:9650/ext/health"
        method: GET
        return_content: yes
      register: health_check
      until: health_check.status == 200
      retries: 30
      delay: 10
