---
# Prepare Migration Node
#
# Sets up a new node for validator migration. Can use either:
# - State sync (default): Downloads state from peers
# - Snapshot restore: Downloads database snapshot from S3 (much faster)
#
# Usage:
#   # State sync (slower, no snapshot needed):
#   ansible-playbook playbooks/primary-network/prepare-migration.yml --limit migration-target
#
#   # Snapshot restore (faster, requires existing snapshot):
#   ansible-playbook playbooks/primary-network/prepare-migration.yml --limit migration-target -e use_snapshot=true
#   ansible-playbook playbooks/primary-network/prepare-migration.yml --limit migration-target -e use_snapshot=true -e snapshot_name=mainnet-2025-02
#
# After preparation:
#   1. Wait for node to sync (all chains bootstrapped)
#   2. Run primary-network/migrate-validator.yml to transfer keys and switch over
#
# Requirements:
#   - New instance already provisioned (i7i.xlarge recommended)
#   - Added to inventory with ansible_host set
#   - For snapshot restore: snapshot must exist in S3

- name: Prepare Node for Validator Migration
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Full sync for Primary Network
    avalanchego_partial_sync_primary_network: false
    # No subnet tracking
    track_subnets: []
    # Node type for config loading
    avalanchego_node_type: "primary-validator"
    # This node is a migration target, not an active validator
    is_migration_target: true
    # Use snapshot for faster bootstrap (set via -e use_snapshot=true)
    use_snapshot: false
    snapshot_name: "latest"

  pre_tasks:
    - name: Wait for system to become reachable
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - unzip
          - lz4
        state: present

    - name: Install AWS CLI v2 # noqa: command-instead-of-module
      ansible.builtin.shell: |
        curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
        unzip -q -o /tmp/awscliv2.zip -d /tmp
        /tmp/aws/install --update
        rm -rf /tmp/awscliv2.zip /tmp/aws
      args:
        executable: /bin/bash
        creates: /usr/local/bin/aws

  roles:
    - role: avalanchego
      vars:
        avalanchego_network: "{{ network | default('fuji') }}"

  post_tasks:
    # Snapshot restore path (faster)
    - name: Restore from snapshot
      when: use_snapshot | bool
      block:
        - name: Check if snapshot exists
          ansible.builtin.command: >
            aws s3 ls s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.tar.lz4
          register: snapshot_check
          failed_when: false
          changed_when: false

        - name: Fail if snapshot not found
          ansible.builtin.fail:
            msg: |
              Snapshot not found: s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.tar.lz4

              Create a snapshot first:
                ansible-playbook playbooks/primary-network/create-snapshot.yml --limit <synced-node>

              Or use state sync instead (slower):
                ansible-playbook playbooks/primary-network/prepare-migration.yml --limit {{ inventory_hostname }}
          when: snapshot_check.rc != 0

        - name: Stop avalanchego for snapshot restore
          ansible.builtin.systemd:
            name: avalanchego
            state: stopped

        - name: Remove existing database
          ansible.builtin.file:
            path: /var/lib/avalanchego/db
            state: absent

        - name: Create database directory
          ansible.builtin.file:
            path: /var/lib/avalanchego/db
            state: directory
            owner: avalanche
            group: avalanche
            mode: '0755'

        - name: Download and extract snapshot
          ansible.builtin.shell: |
            set -o pipefail
            aws s3 cp s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.tar.lz4 - | \
              lz4 -d | \
              tar xf - -C /var/lib/avalanchego
          args:
            executable: /bin/bash
          async: 7200
          poll: 60
          changed_when: true

        - name: Set database ownership
          ansible.builtin.file:
            path: /var/lib/avalanchego/db
            owner: avalanche
            group: avalanche
            recurse: true

        - name: Start avalanchego after snapshot restore
          ansible.builtin.systemd:
            name: avalanchego
            state: started

        - name: Display snapshot restore status
          ansible.builtin.debug:
            msg: "Snapshot restored from s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.tar.lz4"

    # Wait for all chains to fully bootstrap
    - name: Display sync start
      ansible.builtin.debug:
        msg: "Waiting for all chains to bootstrap ({{ 'from snapshot' if use_snapshot | bool else 'via state-sync' }})..."

    - name: Wait for P-Chain to bootstrap
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.isBootstrapped"
          params:
            chain: "P"
        return_content: true
      register: pchain_status
      until: pchain_status.json.result.isBootstrapped | default(false)
      retries: 180
      delay: 30

    - name: Wait for X-Chain to bootstrap
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.isBootstrapped"
          params:
            chain: "X"
        return_content: true
      register: xchain_status
      until: xchain_status.json.result.isBootstrapped | default(false)
      retries: 180
      delay: 30

    - name: Wait for C-Chain to bootstrap
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.isBootstrapped"
          params:
            chain: "C"
        return_content: true
      register: cchain_status
      until: cchain_status.json.result.isBootstrapped | default(false)
      retries: 180
      delay: 30

    - name: Display sync complete
      ansible.builtin.debug:
        msg: "All chains bootstrapped (P, X, C). Node is ready for migration."

    - name: Save migration target info
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/../migration_targets.txt"
        line: "{{ inventory_hostname }}={{ hostvars[inventory_hostname]['ansible_host'] }}={{ 'SNAPSHOT' if use_snapshot | bool else 'STATE_SYNC' }}"
        create: true
        mode: '0644'
      delegate_to: localhost
      become: false

- name: Display next steps
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Show instructions
      ansible.builtin.debug:
        msg: |

          ============================================
          Migration Node Ready
          ============================================

          All chains bootstrapped (P, X, C).
          The node does NOT have staking keys yet - that happens during migration.

          Run migration now:
            ansible-playbook playbooks/primary-network/migrate-validator.yml \
              -e source_host=<current-validator> \
              -e target_host=<this-node>

          ============================================
