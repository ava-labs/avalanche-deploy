---
# Deploy Primary Network Validators
#
# This deploys avalanchego nodes configured as Primary Network validators.
# Unlike L1 validators, these nodes:
#   - Sync full P/X/C chains (no partial-sync)
#   - Use state-sync for faster initial sync
#   - Require substantial storage (937GB NVMe on i4i.xlarge)
#
# Usage:
#   ansible-playbook playbooks/primary-network/deploy.yml
#   ansible-playbook playbooks/primary-network/deploy.yml -e network=mainnet
#
# After deployment completes, the playbook automatically:
#   1. Waits for all chains (P, X, C) to fully bootstrap
#   2. Backs up staking keys to S3 (encrypted with KMS)
#   3. Creates a database snapshot and uploads to S3
#   4. Restarts the node
#
# To skip the snapshot (e.g., when restoring from an existing one):
#   ansible-playbook playbooks/primary-network/deploy.yml -e skip_snapshot=true

- name: Deploy Primary Network Validators
  hosts: primary_validators
  become: true
  gather_facts: true

  vars:
    # Primary Network validators need full sync
    avalanchego_partial_sync_primary_network: false
    # No subnet tracking for Primary Network validators
    track_subnets: []
    # Node type for config loading
    avalanchego_node_type: "primary-validator"

  pre_tasks:
    - name: Wait for system to become reachable
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Wait for cloud-init to finish
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      timeout: 300

    - name: Stop unattended-upgrades to prevent mid-deploy reboot
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: stopped
        enabled: false
      failed_when: false

    - name: Wait for any running dpkg/apt locks to release
      ansible.builtin.shell: while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done
      args:
        executable: /bin/bash
      changed_when: false
      timeout: 300

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install unzip for AWS CLI installation
      ansible.builtin.apt:
        name: unzip
        state: present
      when:
        - ansible_os_family == "Debian"
        - staking_keys_bucket is defined
        - staking_keys_bucket != ""

    - name: Install AWS CLI v2 for S3 backup # noqa: command-instead-of-module
      ansible.builtin.shell: |
        curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
        unzip -q -o /tmp/awscliv2.zip -d /tmp
        /tmp/aws/install --update
        rm -rf /tmp/awscliv2.zip /tmp/aws
      args:
        executable: /bin/bash
        creates: /usr/local/bin/aws
      when:
        - staking_keys_bucket is defined
        - staking_keys_bucket != ""

  roles:
    - role: avalanchego
      vars:
        avalanchego_network: "{{ network | default('fuji') }}"

  post_tasks:
    - name: Get Node ID
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.getNodeID"
        return_content: true
      register: node_info
      until: node_info.status == 200
      retries: 30
      delay: 10

    - name: Display Node ID
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ node_info.json.result.nodeID }}"

    - name: Save node IDs to local file
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/../primary_validator_node_ids.txt"
        line: "{{ inventory_hostname }}={{ hostvars[inventory_hostname]['ansible_host'] }}={{ node_info.json.result.nodeID }}"
        create: true
        mode: "0644"
      delegate_to: localhost
      become: false

- name: Wait for all chains to bootstrap
  hosts: primary_validators
  become: true
  gather_facts: false

  tasks:
    - name: Wait for P-Chain to bootstrap
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.isBootstrapped"
          params:
            chain: "P"
        return_content: true
      register: pchain_status
      until: pchain_status.json.result.isBootstrapped | default(false)
      retries: 180
      delay: 30

    - name: Wait for X-Chain to bootstrap
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.isBootstrapped"
          params:
            chain: "X"
        return_content: true
      register: xchain_status
      until: xchain_status.json.result.isBootstrapped | default(false)
      retries: 180
      delay: 30

    - name: Wait for C-Chain to bootstrap
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.isBootstrapped"
          params:
            chain: "C"
        return_content: true
      register: cchain_status
      until: cchain_status.json.result.isBootstrapped | default(false)
      retries: 180
      delay: 30

    - name: Display sync status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: All chains bootstrapped (P, X, C)"

- name: Backup staking keys to S3
  hosts: primary_validators
  become: true
  gather_facts: false
  tasks:
    - name: Check if S3 backup is enabled
      ansible.builtin.set_fact:
        s3_backup_enabled: "{{ staking_keys_bucket is defined and staking_keys_bucket != '' }}"

    - name: Backup staking keys to S3
      when: s3_backup_enabled | bool
      block:
        - name: Check for staking keys in configured path
          ansible.builtin.stat:
            path: /var/lib/avalanchego/staking/staker.crt
          register: staker_crt_configured

        - name: Check for staking keys in default path
          ansible.builtin.stat:
            path: /home/avalanche/.avalanchego/staking/staker.crt
          register: staker_crt_default

        - name: Set staking directory
          ansible.builtin.set_fact:
            staking_dir: "{{ '/var/lib/avalanchego/staking' if staker_crt_configured.stat.exists else '/home/avalanche/.avalanchego/staking' }}"

        - name: Create backup archive
          ansible.builtin.shell: |
            set -euo pipefail
            tar -czf /tmp/staking-keys-{{ inventory_hostname }}.tar.gz -C {{ staking_dir }} .
            chmod 600 /tmp/staking-keys-{{ inventory_hostname }}.tar.gz
          args:
            executable: /bin/bash
          changed_when: true

        - name: Upload to S3
          ansible.builtin.command: >
            aws s3 cp /tmp/staking-keys-{{ inventory_hostname }}.tar.gz
            s3://{{ staking_keys_bucket }}/{{ inventory_hostname }}/staking-keys.tar.gz
            --sse aws:kms
            --sse-kms-key-id {{ staking_keys_kms_arn }}
          register: s3_upload
          changed_when: s3_upload.rc == 0

        - name: Display backup status
          ansible.builtin.debug:
            msg: "Staking keys backed up to s3://{{ staking_keys_bucket }}/{{ inventory_hostname }}/staking-keys.tar.gz"

        - name: Clean up temp file
          ansible.builtin.file:
            path: /tmp/staking-keys-{{ inventory_hostname }}.tar.gz
            state: absent

- name: Create database snapshot
  hosts: primary_validators
  become: true
  gather_facts: true
  serial: 1

  vars:
    snapshot_name: "{{ inventory_hostname }}-{{ ansible_date_time.date }}"
    temp_dir: /var/lib/avalanchego/snapshot-tmp
    db_path: /var/lib/avalanchego/db
    skip_snapshot: false

  tasks:
    - name: Skip snapshot if requested
      ansible.builtin.meta: end_host
      when: skip_snapshot | bool

    - name: Skip snapshot if S3 not configured
      ansible.builtin.meta: end_host
      when: staking_keys_bucket is not defined or staking_keys_bucket == ''

    - name: Skip snapshot on remaining hosts (only first node needed)
      ansible.builtin.meta: end_host
      when: inventory_hostname != groups['primary_validators'][0]

    - name: Install lz4 compression
      ansible.builtin.apt:
        name: lz4
        state: present

    - name: Get database size
      ansible.builtin.command: du -sh {{ db_path }}
      register: db_size
      changed_when: false

    - name: Display snapshot start
      ansible.builtin.debug:
        msg: "Creating snapshot of {{ db_size.stdout.split()[0] }} database..."

    - name: Create temp directory
      ansible.builtin.file:
        path: "{{ temp_dir }}"
        state: directory
        mode: '0755'

    - name: Stop avalanchego for consistent snapshot
      ansible.builtin.systemd:
        name: avalanchego
        state: stopped

    - name: Create compressed snapshot
      ansible.builtin.shell: |
        set -o pipefail
        cd {{ db_path | dirname }}
        tar cf - db | lz4 > {{ temp_dir }}/{{ snapshot_name }}.tar.lz4
      args:
        executable: /bin/bash
      async: 7200
      poll: 30
      changed_when: true

    - name: Start avalanchego
      ansible.builtin.systemd:
        name: avalanchego
        state: started

    - name: Get snapshot size
      ansible.builtin.stat:
        path: "{{ temp_dir }}/{{ snapshot_name }}.tar.lz4"
      register: snapshot_stat

    - name: Generate SHA256 checksum
      ansible.builtin.shell: set -o pipefail && sha256sum {{ temp_dir }}/{{ snapshot_name }}.tar.lz4 | awk '{print $1}'
      args:
        executable: /bin/bash
      register: snapshot_checksum
      changed_when: false

    - name: Save checksum to file
      ansible.builtin.copy:
        content: "{{ snapshot_checksum.stdout }}  {{ snapshot_name }}.tar.lz4\n"
        dest: "{{ temp_dir }}/{{ snapshot_name }}.sha256"
        mode: '0644'

    - name: Upload snapshot to S3
      ansible.builtin.command: >
        aws s3 cp {{ temp_dir }}/{{ snapshot_name }}.tar.lz4
        s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.tar.lz4
        --sse aws:kms
        --sse-kms-key-id {{ staking_keys_kms_arn }}
      async: 7200
      poll: 60
      changed_when: true

    - name: Create 'latest' pointer
      ansible.builtin.command: >
        aws s3 cp {{ temp_dir }}/{{ snapshot_name }}.tar.lz4
        s3://{{ staking_keys_bucket }}/snapshots/latest.tar.lz4
        --sse aws:kms
        --sse-kms-key-id {{ staking_keys_kms_arn }}
      changed_when: true

    - name: Upload checksum to S3
      ansible.builtin.command: >
        aws s3 cp {{ temp_dir }}/{{ snapshot_name }}.sha256
        s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.sha256
        --sse aws:kms
        --sse-kms-key-id {{ staking_keys_kms_arn }}
      changed_when: true

    - name: Update latest checksum
      ansible.builtin.command: >
        aws s3 cp {{ temp_dir }}/{{ snapshot_name }}.sha256
        s3://{{ staking_keys_bucket }}/snapshots/latest.sha256
        --sse aws:kms
        --sse-kms-key-id {{ staking_keys_kms_arn }}
      changed_when: true

    - name: Create snapshot metadata
      ansible.builtin.copy:
        content: |
          {
            "name": "{{ snapshot_name }}",
            "created": "{{ ansible_date_time.iso8601 }}",
            "source_host": "{{ inventory_hostname }}",
            "size_bytes": {{ snapshot_stat.stat.size }},
            "sha256": "{{ snapshot_checksum.stdout }}",
            "network": "{{ network | default('fuji') }}",
            "chains": ["P", "X", "C"]
          }
        dest: "{{ temp_dir }}/{{ snapshot_name }}.json"
        mode: '0644'

    - name: Upload snapshot metadata
      ansible.builtin.command: >
        aws s3 cp {{ temp_dir }}/{{ snapshot_name }}.json
        s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.json
        --sse aws:kms
        --sse-kms-key-id {{ staking_keys_kms_arn }}
      changed_when: true

    - name: Update latest metadata
      ansible.builtin.command: >
        aws s3 cp {{ temp_dir }}/{{ snapshot_name }}.json
        s3://{{ staking_keys_bucket }}/snapshots/latest.json
        --sse aws:kms
        --sse-kms-key-id {{ staking_keys_kms_arn }}
      changed_when: true

    - name: Clean up temp files
      ansible.builtin.file:
        path: "{{ temp_dir }}"
        state: absent

    - name: Wait for node to be healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/health"
        method: GET
        return_content: true
      register: health_check
      until: health_check.status == 200
      retries: 30
      delay: 10

    - name: Display snapshot status
      ansible.builtin.debug:
        msg: "Snapshot uploaded: s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.tar.lz4 ({{ (snapshot_stat.stat.size / 1073741824) | round(2) }}GB)"

- name: Display summary
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Show instructions
      ansible.builtin.debug:
        msg: |

          ============================================
          Primary Network Validators Ready
          ============================================

          Node IDs saved to: ansible/primary_validator_node_ids.txt

          All chains bootstrapped (P, X, C).
          Staking keys backed up to S3.
          Database snapshot uploaded to S3.

          Next steps:
          1. Register as validator on P-Chain:
             - Requires minimum stake (2000 AVAX on Mainnet, 1 AVAX on Fuji)
             - Use Avalanche Core wallet or CLI

          2. To restore snapshot on a new node:
             ansible-playbook playbooks/primary-network/restore-snapshot.yml \
               --limit <target-node>

          ============================================
