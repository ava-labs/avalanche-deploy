---
# Restore Database from Snapshot
#
# Downloads and restores an avalanchego database snapshot from S3.
# Use this to quickly bootstrap new nodes instead of state sync.
#
# Usage:
#   ansible-playbook playbooks/primary-network/restore-snapshot.yml -e target_host=migration-target
#   ansible-playbook playbooks/primary-network/restore-snapshot.yml -e target_host=migration-target -e snapshot_name=mainnet-2025-02
#
# target_host is REQUIRED (this playbook stops avalanchego and deletes its database).
# If snapshot_name is not specified, uses 'latest'.
#
# Options:
#   verify_integrity: true        - Download file first, verify SHA256, then extract.
#                                   Download + verification happen BEFORE the old
#                                   database is wiped; a bad snapshot leaves the node intact.
#   verify_integrity: false       - Stream directly (faster, default, NO integrity check)
#   skip_checksum_verification: true - Only with verify_integrity=true: explicitly skip
#                                   the SHA256 check (e.g. checksum file lost). A missing
#                                   or mismatched checksum is otherwise a HARD FAILURE.
#
# Failure semantics:
#   - Failure BEFORE the database wipe: avalanchego is restarted and the run fails;
#     the node is exactly as it was.
#   - Failure AFTER the wipe: the node is left STOPPED with a partial database; the
#     rescue message states exactly what to do. It is NOT silently restarted.
#
# Requirements:
#   - S3 bucket with snapshots (created by primary-network/create-snapshot.yml)
#   - Target node has avalanchego installed but NOT running as validator
#   - Sufficient disk space (~2x snapshot size during extraction, 3x if verify_integrity=true)

- name: Validate Restore Parameters
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Check required variables
      ansible.builtin.assert:
        that:
          - target_host is defined
        fail_msg: |
          Missing required variable 'target_host'. This playbook stops avalanchego and
          DELETES its database on the targeted host, so an explicit target is required.
          Usage:
            ansible-playbook playbooks/primary-network/restore-snapshot.yml \
              -e target_host=<inventory-name> [-e snapshot_name=<name>]

    - name: Verify target host exists
      ansible.builtin.assert:
        that:
          - target_host in groups['all']
        fail_msg: "Target host '{{ target_host }}' not found in inventory"

- name: Restore Database from Snapshot
  # default('localhost') is never used: the validation play above aborts the run
  # when target_host is undefined. It only keeps 'hosts' parseable for syntax-check.
  hosts: "{{ target_host | default('localhost') }}"
  become: true
  gather_facts: true

  vars:
    snapshot_name: "latest"
    temp_dir: /var/lib/avalanchego/snapshot-restore
    db_path: /var/lib/avalanchego/db
    verify_integrity: false
    skip_checksum_verification: false

  pre_tasks:
    - name: Verify S3 backup is configured
      ansible.builtin.assert:
        that:
          - staking_keys_bucket is defined
          - staking_keys_bucket != ""
        fail_msg: "S3 backup not configured. Set staking_keys_bucket in inventory."

    - name: Install lz4 compression
      ansible.builtin.apt:
        name: lz4
        state: present

    - name: Check if snapshot exists in S3
      ansible.builtin.command: >
        aws s3 ls s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.tar.lz4
      register: snapshot_exists
      failed_when: false
      changed_when: false

    - name: Fail if snapshot not found
      ansible.builtin.fail:
        msg: |
          Snapshot not found: s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.tar.lz4

          List available snapshots:
            aws s3 ls s3://{{ staking_keys_bucket }}/snapshots/

          Create a snapshot first:
            ansible-playbook playbooks/primary-network/create-snapshot.yml -e target_host=<synced-node>
      when: snapshot_exists.rc != 0

  tasks:
    # Metadata is informational only (used in the final summary); its absence
    # must not block a restore, hence failed_when: false here.
    - name: Get snapshot metadata
      ansible.builtin.command: >
        aws s3 cp s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.json -
      register: snapshot_metadata
      failed_when: false
      changed_when: false

    - name: Parse snapshot metadata
      ansible.builtin.set_fact:
        snapshot_info: "{{ snapshot_metadata.stdout | from_json }}"
      when: snapshot_metadata.rc == 0

    - name: Display snapshot info
      ansible.builtin.debug:
        msg: >-
          Restoring snapshot: {{ snapshot_name }}
          ({{ snapshot_info.created | default('unknown date') }},
          SHA256: {{ snapshot_info.sha256 | default('not available') }})
      when: snapshot_metadata.rc == 0

    - name: Check available disk space
      ansible.builtin.shell: set -o pipefail && df -BG {{ db_path | dirname }} | tail -1 | awk '{print $4}' | sed 's/G//'
      args:
        executable: /bin/bash
      register: available_space
      changed_when: false

    - name: Display available space
      ansible.builtin.debug:
        msg: "Available space: {{ available_space.stdout }}GB"

    - name: Track restore progress (drives rescue recovery decisions)
      ansible.builtin.set_fact:
        restore_phase: "pre-wipe"

    - name: Restore database (phase-tracked, no silent recovery)
      block:
        - name: Stop avalanchego
          ansible.builtin.systemd:
            name: avalanchego
            state: stopped

        - name: Create temp directory
          ansible.builtin.file:
            path: "{{ temp_dir }}"
            state: directory
            mode: '0755'

        # --- Verified mode: download + verify BEFORE wiping the old database ---
        # A missing or mismatched checksum is a hard failure (node restarted,
        # database untouched) unless skip_checksum_verification=true is passed.
        - name: Download checksum file (verified mode)
          ansible.builtin.command: >
            aws s3 cp s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.sha256
            {{ temp_dir }}/{{ snapshot_name }}.sha256
          when: verify_integrity | bool and not (skip_checksum_verification | bool)
          changed_when: true

        - name: Download snapshot file (verified mode)
          ansible.builtin.command: >
            aws s3 cp s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.tar.lz4
            {{ temp_dir }}/{{ snapshot_name }}.tar.lz4
          when: verify_integrity | bool
          async: 7200
          poll: 60
          changed_when: true

        - name: Verify snapshot checksum (verified mode)
          ansible.builtin.shell: |
            set -o pipefail
            cd {{ temp_dir }}
            sha256sum -c {{ snapshot_name }}.sha256
          args:
            executable: /bin/bash
          when: verify_integrity | bool and not (skip_checksum_verification | bool)
          changed_when: false

        - name: Display checksum verification success
          ansible.builtin.debug:
            msg: "Checksum verified successfully"
          when: verify_integrity | bool and not (skip_checksum_verification | bool)

        - name: Warn that checksum verification was explicitly skipped
          ansible.builtin.debug:
            msg: "WARNING: skip_checksum_verification=true — restoring WITHOUT SHA256 verification at operator request."
          when: verify_integrity | bool and skip_checksum_verification | bool

        # --- Point of no return: the old database is destroyed below ---
        - name: Mark restore as past the point of no return
          ansible.builtin.set_fact:
            restore_phase: "post-wipe"

        - name: Remove existing database
          ansible.builtin.file:
            path: "{{ db_path }}"
            state: absent

        - name: Create database directory
          ansible.builtin.file:
            path: "{{ db_path }}"
            state: directory
            owner: avalanche
            group: avalanche
            mode: '0755'

        - name: Extract snapshot (verified mode)
          ansible.builtin.shell: |
            set -o pipefail
            lz4 -d {{ temp_dir }}/{{ snapshot_name }}.tar.lz4 | \
              tar xf - -C {{ db_path | dirname }}
          args:
            executable: /bin/bash
          when: verify_integrity | bool
          async: 7200
          poll: 60
          changed_when: true

        - name: Download and extract snapshot (streaming mode)
          ansible.builtin.shell: |
            set -o pipefail
            aws s3 cp s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.tar.lz4 - | \
              lz4 -d | \
              tar xf - -C {{ db_path | dirname }}
          args:
            executable: /bin/bash
          register: restore_result
          when: not (verify_integrity | bool)
          async: 7200  # 2 hour timeout
          poll: 60
          changed_when: true

        - name: Set database ownership
          ansible.builtin.file:
            path: "{{ db_path }}"
            owner: avalanche
            group: avalanche
            recurse: true

        - name: Clean up temp directory
          ansible.builtin.file:
            path: "{{ temp_dir }}"
            state: absent

        - name: Start avalanchego
          ansible.builtin.systemd:
            name: avalanchego
            state: started

        - name: Mark node as restarted on restored database
          ansible.builtin.set_fact:
            restore_phase: "started"

        - name: Wait for node to start
          ansible.builtin.uri:
            url: "http://127.0.0.1:9650/ext/info"
            method: POST
            body_format: json
            body:
              jsonrpc: "2.0"
              id: 1
              method: "info.getNodeID"
            return_content: true
          register: node_info
          until: node_info.status == 200
          retries: 30
          delay: 10

        - name: Display Node ID
          ansible.builtin.debug:
            msg: "Node ID: {{ node_info.json.result.nodeID }}"

        - name: Check P-Chain status
          ansible.builtin.uri:
            url: "http://127.0.0.1:9650/ext/info"
            method: POST
            body_format: json
            body:
              jsonrpc: "2.0"
              id: 1
              method: "info.isBootstrapped"
              params:
                chain: "P"
            return_content: true
          register: pchain_status
          until: pchain_status.status == 200
          retries: 60
          delay: 10

        - name: Display completion message
          ansible.builtin.debug:
            msg: |

              ============================================
              Snapshot Restored Successfully
              ============================================

              Node ID: {{ node_info.json.result.nodeID }}
              Snapshot: {{ snapshot_name }}
              Integrity: {{ 'Verified' if (verify_integrity | bool and not (skip_checksum_verification | bool)) else 'NOT VERIFIED' }}
              {% if snapshot_info is defined and snapshot_info.sha256 is defined %}
              SHA256: {{ snapshot_info.sha256 }}
              {% endif %}

              The node is now catching up from the snapshot.
              This should only take a few minutes to sync recent blocks.

              Check sync status:
                ./scripts/primary-network/check-sync.sh {{ ansible_host }}

              P-Chain bootstrapped: {{ pchain_status.json.result.isBootstrapped | default(false) }}

              {% if not (verify_integrity | bool) %}
              TIP: For verified restores, use: -e verify_integrity=true
              {% endif %}
              ============================================
      rescue:
        # Phase 'pre-wipe': the old database is untouched — safe to restart.
        - name: Restart avalanchego (database untouched)
          ansible.builtin.systemd:
            name: avalanchego
            state: started
          when: restore_phase == 'pre-wipe'

        # The database is intact and a re-run re-downloads everything; don't
        # leave a multi-hundred-GB download on the NVMe next to the live DB.
        - name: Clean up temp artifacts (database untouched)
          ansible.builtin.file:
            path: "{{ temp_dir }}"
            state: absent
          when: restore_phase == 'pre-wipe'

        - name: Report failure before database wipe
          ansible.builtin.debug:
            msg: |
              RESTORE FAILED BEFORE the old database was touched (download or
              checksum verification stage). avalanchego has been RESTARTED on its
              original database — the node is exactly as it was before this run.

              If the failure was a missing/mismatched checksum, do NOT bypass it
              casually: the snapshot may be corrupted. Re-create the snapshot, or
              (last resort, accepting the risk) re-run with
              -e skip_checksum_verification=true.
          when: restore_phase == 'pre-wipe'

        # Phase 'post-wipe': old DB destroyed, restore incomplete. Restarting
        # here would boot a half-restored database as if nothing happened.
        - name: Report failure after database wipe — node left STOPPED
          ansible.builtin.debug:
            msg: |
              RESTORE FAILED AFTER the old database was wiped.

              Current state of {{ inventory_hostname }}:
                - avalanchego: STOPPED (deliberately NOT restarted)
                - {{ db_path }}: PARTIAL / INCOMPLETE restore — not usable as-is
                - temp artifacts may remain in {{ temp_dir }}

              Do ONE of the following:
                1. Re-run the restore (recommended):
                     ansible-playbook playbooks/primary-network/restore-snapshot.yml \
                       -e target_host={{ inventory_hostname }} -e snapshot_name={{ snapshot_name }} \
                       -e verify_integrity=true
                2. Abandon the snapshot and resync from the network:
                     sudo rm -rf {{ db_path }} {{ temp_dir }}
                     sudo systemctl start avalanchego   # state-sync bootstrap (slow)

              Do NOT just 'systemctl start avalanchego' on the partial database.
          when: restore_phase == 'post-wipe'

        # Phase 'started': database restored and node running, but post-start
        # checks failed. Leave it running; tell the operator what to check.
        - name: Report failure after node start
          ansible.builtin.debug:
            msg: |
              The snapshot was restored and avalanchego was STARTED, but the
              post-start checks failed (node not responding / P-Chain check).

              Current state of {{ inventory_hostname }}:
                - avalanchego: RUNNING on the restored database
                - It may simply still be replaying/bootstrapping.

              Check:
                sudo systemctl status avalanchego
                sudo journalctl -u avalanchego -n 200
                curl -s http://127.0.0.1:9650/ext/health
          when: restore_phase == 'started'

        - name: Re-raise restore failure
          ansible.builtin.fail:
            msg: >-
              Restore failed at '{{ ansible_failed_task.name }}'
              (phase: {{ restore_phase }}):
              {{ ansible_failed_result.msg | default(ansible_failed_result) }}
