---
# Create Database Snapshot
#
# Creates a snapshot of the avalanchego database and uploads to S3.
# Use this after a node is fully synced to speed up future deployments.
#
# Usage:
#   ansible-playbook playbooks/primary-network/create-snapshot.yml --limit primary-validator-1
#   ansible-playbook playbooks/primary-network/create-snapshot.yml --limit primary-validator-1 -e snapshot_name=mainnet-2025-02
#
# The snapshot is uploaded to: s3://<bucket>/snapshots/<snapshot_name>.tar.lz4
#
# Requirements:
#   - Node must be fully synced (all chains bootstrapped)
#   - S3 bucket configured (staking_keys_bucket)
#   - Sufficient disk space on NVMe for temporary archive (~50% of db size)
#   - lz4 compression utility

- name: Create Database Snapshot
  hosts: all
  become: true
  gather_facts: true

  vars:
    snapshot_name: "{{ inventory_hostname }}-{{ ansible_date_time.date }}"
    temp_dir: /var/lib/avalanchego/snapshot-tmp
    db_path: /var/lib/avalanchego/db

  pre_tasks:
    - name: Verify S3 backup is configured
      ansible.builtin.assert:
        that:
          - staking_keys_bucket is defined
          - staking_keys_bucket != ""
        fail_msg: "S3 backup not configured. Set staking_keys_bucket in inventory."

    - name: Install lz4 compression
      ansible.builtin.apt:
        name: lz4
        state: present

    - name: Check P-Chain bootstrap status
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.isBootstrapped"
          params:
            chain: "P"
        return_content: true
      register: pchain_status

    - name: Check X-Chain bootstrap status
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.isBootstrapped"
          params:
            chain: "X"
        return_content: true
      register: xchain_status

    - name: Check C-Chain bootstrap status
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.isBootstrapped"
          params:
            chain: "C"
        return_content: true
      register: cchain_status

    - name: Verify all chains are bootstrapped
      ansible.builtin.assert:
        that:
          - pchain_status.json.result.isBootstrapped | default(false)
          - xchain_status.json.result.isBootstrapped | default(false)
          - cchain_status.json.result.isBootstrapped | default(false)
        fail_msg: |
          Node is not fully synced! Cannot create snapshot.
          P-Chain: {{ pchain_status.json.result.isBootstrapped | default(false) }}
          X-Chain: {{ xchain_status.json.result.isBootstrapped | default(false) }}
          C-Chain: {{ cchain_status.json.result.isBootstrapped | default(false) }}

  tasks:
    - name: Get database size
      ansible.builtin.command: du -sh {{ db_path }}
      register: db_size
      changed_when: false

    - name: Display database size
      ansible.builtin.debug:
        msg: "Database size: {{ db_size.stdout.split()[0] }}"

    - name: Check available disk space
      ansible.builtin.shell: set -o pipefail && df -BG {{ temp_dir | dirname }} | tail -1 | awk '{print $4}' | sed 's/G//'
      args:
        executable: /bin/bash
      register: available_space
      changed_when: false

    - name: Display available space
      ansible.builtin.debug:
        msg: "Available space: {{ available_space.stdout }}GB"

    - name: Create temp directory
      ansible.builtin.file:
        path: "{{ temp_dir }}"
        state: directory
        mode: '0755'

    - name: Stop avalanchego for consistent snapshot
      ansible.builtin.systemd:
        name: avalanchego
        state: stopped

    - name: Create compressed snapshot
      ansible.builtin.shell: |
        set -o pipefail
        cd {{ db_path | dirname }}
        tar cf - db | lz4 > {{ temp_dir }}/{{ snapshot_name }}.tar.lz4
      args:
        executable: /bin/bash
      register: snapshot_create
      async: 7200  # 2 hour timeout
      poll: 30
      changed_when: true

    - name: Start avalanchego
      ansible.builtin.systemd:
        name: avalanchego
        state: started

    - name: Get snapshot size
      ansible.builtin.stat:
        path: "{{ temp_dir }}/{{ snapshot_name }}.tar.lz4"
      register: snapshot_stat

    - name: Display snapshot size
      ansible.builtin.debug:
        msg: "Snapshot size: {{ (snapshot_stat.stat.size / 1073741824) | round(2) }}GB"

    - name: Generate SHA256 checksum
      ansible.builtin.shell: set -o pipefail && sha256sum {{ temp_dir }}/{{ snapshot_name }}.tar.lz4 | awk '{print $1}'
      args:
        executable: /bin/bash
      register: snapshot_checksum
      changed_when: false

    - name: Display checksum
      ansible.builtin.debug:
        msg: "SHA256: {{ snapshot_checksum.stdout }}"

    - name: Save checksum to file
      ansible.builtin.copy:
        content: "{{ snapshot_checksum.stdout }}  {{ snapshot_name }}.tar.lz4\n"
        dest: "{{ temp_dir }}/{{ snapshot_name }}.sha256"
        mode: '0644'

    - name: Upload snapshot to S3
      ansible.builtin.command: >
        aws s3 cp {{ temp_dir }}/{{ snapshot_name }}.tar.lz4
        s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.tar.lz4
        --sse aws:kms
        --sse-kms-key-id {{ staking_keys_kms_arn }}
      register: s3_upload
      async: 7200  # 2 hour timeout for large uploads
      poll: 60
      changed_when: true

    - name: Create 'latest' pointer
      ansible.builtin.command: >
        aws s3 cp {{ temp_dir }}/{{ snapshot_name }}.tar.lz4
        s3://{{ staking_keys_bucket }}/snapshots/latest.tar.lz4
        --sse aws:kms
        --sse-kms-key-id {{ staking_keys_kms_arn }}
      register: s3_latest
      changed_when: s3_latest.rc == 0

    - name: Upload checksum to S3
      ansible.builtin.command: >
        aws s3 cp {{ temp_dir }}/{{ snapshot_name }}.sha256
        s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.sha256
        --sse aws:kms
        --sse-kms-key-id {{ staking_keys_kms_arn }}
      changed_when: true

    - name: Update latest checksum
      ansible.builtin.command: >
        aws s3 cp {{ temp_dir }}/{{ snapshot_name }}.sha256
        s3://{{ staking_keys_bucket }}/snapshots/latest.sha256
        --sse aws:kms
        --sse-kms-key-id {{ staking_keys_kms_arn }}
      changed_when: true

    - name: Create snapshot metadata
      ansible.builtin.copy:
        content: |
          {
            "name": "{{ snapshot_name }}",
            "created": "{{ ansible_date_time.iso8601 }}",
            "source_host": "{{ inventory_hostname }}",
            "size_bytes": {{ snapshot_stat.stat.size }},
            "sha256": "{{ snapshot_checksum.stdout }}",
            "network": "{{ network | default('fuji') }}",
            "chains": ["P", "X", "C"]
          }
        dest: "{{ temp_dir }}/{{ snapshot_name }}.json"
        mode: '0644'

    - name: Upload snapshot metadata
      ansible.builtin.command: >
        aws s3 cp {{ temp_dir }}/{{ snapshot_name }}.json
        s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.json
        --sse aws:kms
        --sse-kms-key-id {{ staking_keys_kms_arn }}
      changed_when: true

    - name: Update latest metadata
      ansible.builtin.command: >
        aws s3 cp {{ temp_dir }}/{{ snapshot_name }}.json
        s3://{{ staking_keys_bucket }}/snapshots/latest.json
        --sse aws:kms
        --sse-kms-key-id {{ staking_keys_kms_arn }}
      changed_when: true

    - name: Clean up temp files
      ansible.builtin.file:
        path: "{{ temp_dir }}"
        state: absent

    - name: Wait for node to be healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/health"
        method: GET
        return_content: true
      register: health_check
      until: health_check.status == 200
      retries: 30
      delay: 10

    - name: Display completion message
      ansible.builtin.debug:
        msg: |

          ============================================
          Snapshot Created Successfully
          ============================================

          Snapshot: {{ snapshot_name }}
          Size: {{ (snapshot_stat.stat.size / 1073741824) | round(2) }}GB
          Location: s3://{{ staking_keys_bucket }}/snapshots/{{ snapshot_name }}.tar.lz4
          Latest: s3://{{ staking_keys_bucket }}/snapshots/latest.tar.lz4

          To restore on a new node:
            ansible-playbook playbooks/primary-network/restore-snapshot.yml \
              --limit <target-node> \
              -e snapshot_name={{ snapshot_name }}

          Or use 'latest':
            ansible-playbook playbooks/primary-network/restore-snapshot.yml \
              --limit <target-node>

          ============================================
