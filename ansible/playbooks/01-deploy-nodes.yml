---
# Phase 1: Deploy nodes and sync with primary network
#
# This deploys avalanchego nodes that sync with Fuji/Mainnet.
# They do NOT track any subnet yet - that comes after L1 creation.
#
# Usage:
#   ansible-playbook playbooks/01-deploy-nodes.yml
#
# After this completes:
#   1. Wait for nodes to sync (check /ext/health)
#   2. Run create-l1 tool to create your L1
#   3. Run 02-configure-l1.yml with the SUBNET_ID

- name: Deploy Avalanche Nodes (Phase 1 - Primary Network Sync)
  hosts: validators:rpc
  become: true
  gather_facts: true

  vars:
    # No subnet tracking in phase 1
    track_subnets: []

  pre_tasks:
    - name: Wait for system to become reachable
      wait_for_connection:
        timeout: 300

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

  roles:
    - role: avalanchego
      vars:
        avalanchego_network: "{{ network | default('fuji') }}"

  post_tasks:
    - name: Get Node ID
      uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.getNodeID"
        return_content: yes
      register: node_info
      until: node_info.status == 200
      retries: 30
      delay: 10

    - name: Display Node ID
      debug:
        msg: "{{ inventory_hostname }}: {{ (node_info.json.result.nodeID) }}"

    - name: Save node IDs to local file
      lineinfile:
        path: "{{ playbook_dir }}/../node_ids.txt"
        line: "{{ inventory_hostname }}={{ hostvars[inventory_hostname]['ansible_host'] }}={{ node_info.json.result.nodeID }}"
        create: yes
      delegate_to: localhost
      become: false

- name: Display next steps
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Show instructions
      debug:
        msg: |

          ============================================
          Phase 1 Complete - Nodes Deployed
          ============================================

          Node IDs saved to: ansible/node_ids.txt

          Next steps:
          1. Wait for nodes to sync with {{ network | default('fuji') }}
             Check: curl http://<node-ip>:9650/ext/health

          2. Create your L1:
             cd tools/create-l1
             export AVALANCHE_PRIVATE_KEY=PrivateKey-...
             ./create-l1 --network={{ network | default('fuji') }} \
               --validators=<ip1>,<ip2>,<ip3> \
               --genesis=../../genesis.json

          3. Configure nodes with your L1:
             SUBNET_ID=<from-create-l1-output>
             ansible-playbook playbooks/02-configure-l1.yml -e subnet_id=$SUBNET_ID

          ============================================
