---
# Phase 1: Deploy nodes and sync with primary network
#
# This deploys avalanchego nodes that sync with Fuji/Mainnet.
# They do NOT track any subnet yet - that comes after L1 creation.
#
# Usage:
#   ansible-playbook playbooks/01-deploy-nodes.yml
#
# After this completes:
#   1. Wait for nodes to sync (check /ext/health)
#   2. Run create-l1 tool to create your L1
#   3. Run 02-configure-l1.yml with the SUBNET_ID

- name: Deploy Avalanche Nodes (Phase 1 - Primary Network Sync)
  hosts: validators:rpc
  become: true
  gather_facts: true

  vars:
    # No subnet tracking in phase 1
    track_subnets: []

  pre_tasks:
    - name: Wait for system to become reachable
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install AWS CLI for staking key backup
      ansible.builtin.apt:
        name: awscli
        state: present
      when:
        - ansible_os_family == "Debian"
        - staking_keys_bucket is defined
        - staking_keys_bucket != ""
        - node_type == "validator"

  roles:
    - role: avalanchego
      vars:
        avalanchego_network: "{{ network | default('fuji') }}"

  post_tasks:
    - name: Get Node ID
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.getNodeID"
        return_content: true
      register: node_info
      until: node_info.status == 200
      retries: 30
      delay: 10

    - name: Display Node ID
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ (node_info.json.result.nodeID) }}"

    - name: Save node IDs to local file
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/../node_ids.txt"
        line: "{{ inventory_hostname }}={{ hostvars[inventory_hostname]['ansible_host'] }}={{ node_info.json.result.nodeID }}"
        create: true
      delegate_to: localhost
      become: false

- name: Backup validator staking keys to S3
  hosts: validators
  become: true
  gather_facts: false
  tasks:
    - name: Check if S3 backup is configured
      ansible.builtin.set_fact:
        s3_backup_enabled: "{{ staking_keys_bucket is defined and staking_keys_bucket != '' }}"

    - name: Backup staking keys to S3
      when: s3_backup_enabled | bool
      block:
        - name: Create backup archive
          ansible.builtin.archive:
            path: /var/lib/avalanchego/staking/
            dest: /tmp/staking-keys-{{ inventory_hostname }}.tar.gz
            format: gz

        - name: Upload to S3
          ansible.builtin.command: >
            aws s3 cp /tmp/staking-keys-{{ inventory_hostname }}.tar.gz
            s3://{{ staking_keys_bucket }}/{{ inventory_hostname }}/staking-keys.tar.gz
            --sse aws:kms
            --sse-kms-key-id {{ staking_keys_kms_arn }}
          register: s3_upload
          changed_when: s3_upload.rc == 0

        - name: Display backup status
          ansible.builtin.debug:
            msg: "Staking keys backed up to s3://{{ staking_keys_bucket }}/{{ inventory_hostname }}/staking-keys.tar.gz"

        - name: Clean up temp file
          ansible.builtin.file:
            path: /tmp/staking-keys-{{ inventory_hostname }}.tar.gz
            state: absent

- name: Display next steps
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Show instructions
      ansible.builtin.debug:
        msg: |

          ============================================
          Phase 1 Complete - Nodes Deployed
          ============================================

          Node IDs saved to: ansible/node_ids.txt
          Staking keys backed up to S3 (if enabled)

          Next steps:
          1. Wait for nodes to sync with {{ network | default('fuji') }}
             Check: curl http://<node-ip>:9650/ext/health

          2. Create your L1:
             cd tools/create-l1
             export AVALANCHE_PRIVATE_KEY=PrivateKey-...
             ./create-l1 --network={{ network | default('fuji') }} \
               --validators=<ip1>,<ip2>,<ip3> \
               --genesis=../../genesis.json

          3. Configure nodes with your L1:
             SUBNET_ID=<from-create-l1-output>
             ansible-playbook playbooks/02-configure-l1.yml -e subnet_id=$SUBNET_ID

          To backup keys manually later:
             make backup-keys

          ============================================
