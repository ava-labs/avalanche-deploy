---
# Deploy Primary Network Validators
#
# This deploys avalanchego nodes configured as Primary Network validators.
# Unlike L1 validators, these nodes:
#   - Sync full P/X/C chains (no partial-sync)
#   - Use state-sync for faster initial sync
#   - Require substantial storage (937GB NVMe on i4i.xlarge)
#
# Usage:
#   ansible-playbook playbooks/10-deploy-primary-network.yml
#   ansible-playbook playbooks/10-deploy-primary-network.yml -e network=mainnet
#
# After deployment:
#   1. Wait for all chains to bootstrap (check scripts/check-primary-sync.sh)
#   2. Register validator with P-Chain (requires staking)
#   3. Back up staking keys: make backup-keys

- name: Deploy Primary Network Validators
  hosts: primary_validators
  become: true
  gather_facts: true

  vars:
    # Primary Network validators need full sync
    avalanchego_partial_sync_primary_network: false
    # No subnet tracking for Primary Network validators
    track_subnets: []
    # Node type for config loading
    avalanchego_node_type: "primary-validator"

  pre_tasks:
    - name: Wait for system to become reachable
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Wait for cloud-init to finish
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      timeout: 300

    - name: Stop unattended-upgrades to prevent mid-deploy reboot
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: stopped
        enabled: false
      failed_when: false

    - name: Wait for any running dpkg/apt locks to release
      ansible.builtin.shell: while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done
      args:
        executable: /bin/bash
      changed_when: false
      timeout: 300

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install unzip for AWS CLI installation
      ansible.builtin.apt:
        name: unzip
        state: present
      when:
        - ansible_os_family == "Debian"
        - staking_keys_bucket is defined
        - staking_keys_bucket != ""

    - name: Install AWS CLI v2 for S3 backup # noqa: command-instead-of-module
      ansible.builtin.shell: |
        curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
        unzip -q -o /tmp/awscliv2.zip -d /tmp
        /tmp/aws/install --update
        rm -rf /tmp/awscliv2.zip /tmp/aws
      args:
        executable: /bin/bash
        creates: /usr/local/bin/aws
      when:
        - staking_keys_bucket is defined
        - staking_keys_bucket != ""

  roles:
    - role: avalanchego
      vars:
        avalanchego_network: "{{ network | default('fuji') }}"

  post_tasks:
    - name: Get Node ID
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.getNodeID"
        return_content: true
      register: node_info
      until: node_info.status == 200
      retries: 30
      delay: 10

    - name: Display Node ID
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ node_info.json.result.nodeID }}"

    - name: Save node IDs to local file
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/../primary_validator_node_ids.txt"
        line: "{{ inventory_hostname }}={{ hostvars[inventory_hostname]['ansible_host'] }}={{ node_info.json.result.nodeID }}"
        create: true
        mode: "0644"
      delegate_to: localhost
      become: false

- name: Backup staking keys to S3
  hosts: primary_validators
  become: true
  gather_facts: false
  tasks:
    - name: Check if S3 backup is enabled
      ansible.builtin.set_fact:
        s3_backup_enabled: "{{ staking_keys_bucket is defined and staking_keys_bucket != '' }}"

    - name: Backup staking keys to S3
      when: s3_backup_enabled | bool
      block:
        - name: Create backup archive
          ansible.builtin.shell: |
            set -euo pipefail
            tar -czf /tmp/staking-keys-{{ inventory_hostname }}.tar.gz -C /var/lib/avalanchego/staking .
            chmod 600 /tmp/staking-keys-{{ inventory_hostname }}.tar.gz
          args:
            executable: /bin/bash
          changed_when: true

        - name: Upload to S3
          ansible.builtin.command: >
            aws s3 cp /tmp/staking-keys-{{ inventory_hostname }}.tar.gz
            s3://{{ staking_keys_bucket }}/{{ inventory_hostname }}/staking-keys.tar.gz
            --sse aws:kms
            --sse-kms-key-id {{ staking_keys_kms_arn }}
          register: s3_upload
          changed_when: s3_upload.rc == 0

        - name: Display backup status
          ansible.builtin.debug:
            msg: "Staking keys backed up to s3://{{ staking_keys_bucket }}/{{ inventory_hostname }}/staking-keys.tar.gz"

        - name: Clean up temp file
          ansible.builtin.file:
            path: /tmp/staking-keys-{{ inventory_hostname }}.tar.gz
            state: absent

- name: Display next steps
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Show instructions
      ansible.builtin.debug:
        msg: |

          ============================================
          Primary Network Validators Deployed
          ============================================

          Node IDs saved to: ansible/primary_validator_node_ids.txt

          Next steps:
          1. Wait for all chains to bootstrap (P, X, C):
             ./scripts/check-primary-sync.sh

          2. Check bootstrap progress:
             curl http://<node-ip>:9650/ext/info -X POST \
               -H 'Content-Type: application/json' \
               -d '{"jsonrpc":"2.0","id":1,"method":"info.isBootstrapped","params":{"chain":"P"}}'

          3. Register as validator on P-Chain:
             - Requires minimum stake (2000 AVAX on Mainnet, 1 AVAX on Fuji)
             - Use Avalanche Core wallet or CLI

          4. Verify staking keys are backed up:
             aws s3 ls s3://<bucket>/primary-validator-1/

          ============================================
