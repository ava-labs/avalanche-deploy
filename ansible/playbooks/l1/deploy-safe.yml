---
# Deploy Safe Multisig Infrastructure
# Usage: make safe  (auto-detects chain_id/evm_chain_id from l1.env)
#   or:  ansible-playbook playbooks/l1/deploy-safe.yml -e "chain_id=<CHAIN_ID> evm_chain_id=<EVM_CHAIN_ID>"

- name: Deploy Safe Multisig Infrastructure
  hosts: rpc
  become: true
  # chain_id and evm_chain_id must be provided via -e, group_vars, or auto-detected from l1.env

  pre_tasks:
    - name: Verify chain_id is provided
      ansible.builtin.fail:
        msg: "chain_id must be provided. Use -e 'chain_id=<value>' or ensure l1.env exists"
      when: chain_id is not defined

    - name: Verify evm_chain_id is provided
      ansible.builtin.fail:
        msg: "evm_chain_id must be provided. Use -e 'evm_chain_id=<value>' or ensure l1.env exists"
      when: evm_chain_id is not defined

    - name: Check if avalanchego is running
      ansible.builtin.systemd:
        name: avalanchego
      register: avalanchego_status
      changed_when: false
      failed_when: false

    - name: Warn if avalanchego is not running
      ansible.builtin.debug:
        msg: "WARNING: avalanchego is not running. Safe services will not be able to connect to the RPC."
      when: avalanchego_status.status.ActiveState != 'active'

  roles:
    - role: safe

  post_tasks:
    - name: Verify Transaction Service health
      ansible.builtin.uri:
        url: "http://localhost:{{ safe_txs_port }}/api/v1/about/"
        method: GET
      register: txs_about
      failed_when: false

    - name: Verify Config Service health
      ansible.builtin.uri:
        url: "http://localhost:{{ safe_cfg_port }}/api/v1/about/"
        method: GET
      register: cfg_about
      failed_when: false

    - name: Verify Client Gateway health
      ansible.builtin.uri:
        url: "http://localhost:{{ safe_cgw_port }}/about"
        method: GET
      register: cgw_health
      failed_when: false

    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          ============================================
          Safe Multisig Infrastructure Deployment
          ============================================

          Status:
            Transaction Service: {{ 'OK' if txs_about.status == 200 else 'FAILED' }}
            Config Service:      {{ 'OK' if cfg_about.status == 200 else 'FAILED' }}
            Client Gateway:      {{ 'OK' if cgw_health.status == 200 else 'FAILED' }}

          URLs:
            Web UI:              http://{{ ansible_host }}:{{ safe_http_port }}/
            Transaction API:     http://{{ ansible_host }}:{{ safe_http_port }}/txs/api/v1/
            Config API:          http://{{ ansible_host }}:{{ safe_http_port }}/cfg/api/v1/
            Gateway API:         http://{{ ansible_host }}:{{ safe_http_port }}/cgw/

          Chain Configuration:
            Avalanche Chain ID:  {{ chain_id }}
            EVM Chain ID:        {{ evm_chain_id }}
            RPC URL:             {{ safe_rpc_url }}

          Contract Addresses (v1.4.1):
            Safe Singleton:      {{ safe_contracts.safe_singleton }}
            Proxy Factory:       {{ safe_contracts.proxy_factory }}
            MultiSend:           {{ safe_contracts.multi_send }}
            Fallback Handler:    {{ safe_contracts.fallback_handler }}

          ============================================
