---
# Deploy ICM Relayer Playbook
#
# Deploys the ICM (Interchain Messaging) Relayer for cross-chain messaging.
# The relayer listens for Avalanche Warp Messages on source blockchains,
# aggregates BLS signatures from validators, and delivers cross-chain
# messages to destination blockchains.
#
# Usage:
#   ansible-playbook playbooks/16-deploy-icm-relayer.yml \
#     -e l1_subnet_id=xxx \
#     -e l1_chain_id=yyy \
#     -e relayer_private_key=0x...
#
# Or with l1.env loaded:
#   source ../l1.env
#   ansible-playbook playbooks/16-deploy-icm-relayer.yml \
#     -e l1_subnet_id=$SUBNET_ID \
#     -e l1_chain_id=$CHAIN_ID \
#     -e relayer_private_key=0x...
#
# Required variables:
#   l1_subnet_id: Subnet ID (from create-l1 output)
#   l1_chain_id: Chain ID / blockchain ID (from create-l1 output)
#   relayer_private_key: Private key for relay transactions (must be funded on both chains!)
#
# Optional variables:
#   icm_relayer_version: Docker image tag (default: v1.7.5)
#   icm_relayer_network: fuji or mainnet (default: fuji)
#   icm_relayer_bidirectional: Enable C-Chain <-> L1 relaying (default: true)
#   icm_relayer_log_level: Log level (default: info)

- name: Validate required variables
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Validate rpc group exists
      ansible.builtin.assert:
        that:
          - groups['rpc'] is defined
          - groups['rpc'] | length > 0
        fail_msg: "Inventory must have at least one node in 'rpc' group"

    - name: Check required variables
      ansible.builtin.fail:
        msg: "Missing required variable: {{ item }}"
      when: vars[item] is not defined or vars[item] == ''
      loop:
        - l1_subnet_id
        - l1_chain_id
        - relayer_private_key

- name: Deploy ICM Relayer
  hosts: rpc[0]
  become: true
  gather_facts: true

  pre_tasks:
    - name: Wait for system to become reachable
      ansible.builtin.wait_for_connection:
        timeout: 300

  roles:
    - role: icm_relayer
      vars:
        icm_relayer_source_subnet_id: "{{ hostvars['localhost']['l1_subnet_id'] }}"
        icm_relayer_source_blockchain_id: "{{ hostvars['localhost']['l1_chain_id'] }}"
        icm_relayer_destination_private_key: "{{ hostvars['localhost']['relayer_private_key'] }}"
        icm_relayer_rpc_host: "127.0.0.1"
        icm_relayer_network: "{{ hostvars['localhost']['icm_relayer_network'] | default('fuji') }}"

- name: Display ICM Relayer Information
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Get RPC node IP
      ansible.builtin.set_fact:
        relayer_host: "{{ hostvars[groups['rpc'][0]]['ansible_host'] }}"

    - name: Show ICM Relayer information
      ansible.builtin.debug:
        msg: |

          ============================================
          ICM Relayer Deployed Successfully
          ============================================

          API Endpoint:
            http://{{ relayer_host }}:{{ icm_relayer_api_port | default(8080) }}

          Health Check:
            http://{{ relayer_host }}:{{ icm_relayer_api_port | default(8080) }}/health

          Metrics (Prometheus):
            http://{{ relayer_host }}:{{ icm_relayer_metrics_port | default(9090) }}/metrics

          ============================================
          Relay Configuration
          ============================================

          Source Blockchains:
            - L1 Chain: {{ l1_chain_id }} (subnet: {{ l1_subnet_id }})
            - C-Chain:  {{ icm_relayer_cchain_ids[icm_relayer_network | default('fuji')].blockchain_id | default('(bidirectional)') }}

          Destination Blockchains:
            - C-Chain:  {{ icm_relayer_cchain_ids[icm_relayer_network | default('fuji')].blockchain_id | default('') }}
            - L1 Chain: {{ l1_chain_id }}

          Network: {{ icm_relayer_network | default('fuji') }}
          Bidirectional: {{ icm_relayer_bidirectional | default(true) }}

          ============================================
          IMPORTANT
          ============================================

          The relayer wallet MUST be funded on BOTH chains:
            - C-Chain: Fund with AVAX for gas
            - L1 Chain: Fund with native token for gas

          To check relay status:
            curl http://{{ relayer_host }}:{{ icm_relayer_api_port | default(8080) }}/health

          ============================================
