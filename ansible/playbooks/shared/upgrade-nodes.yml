---
# Upgrade Nodes Playbook
#
# Upgrades avalanchego to a new version across all nodes with zero downtime.
# Uses rolling restart to upgrade one node at a time (serial: 1) - a failure
# on any node (download, checksum mismatch, health check) aborts the play
# before the next node is touched.
#
# The download and SHA256 verification happen while the node keeps running
# (via the avalanchego role's install tasks); the service is only restarted
# after a verified binary is in place, and only if it actually changed.
# Nodes already running the target version are skipped entirely.
#
# NOTE: As of avalanchego v1.12.0+, subnet-evm is bundled with avalanchego.
#       The plugin is automatically installed from the avalanchego release tarball.
#       No separate subnet-evm download is needed.
#
# Checksums: avalanchego releases publish no checksum manifest, so known-good
# SHA256 values are pinned in roles/avalanchego/defaults/main.yml
# (avalanchego_checksums). For a version not pinned there, pass
# -e avalanchego_checksum_sha256=<sha256>.
#
# Usage:
#   ansible-playbook playbooks/shared/upgrade-nodes.yml -e avalanchego_version=1.14.2
#
# Required variables:
#   avalanchego_version: Target avalanchego version (e.g. 1.14.2 or v1.14.2)

- name: Validate upgrade parameters
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Check required version
      ansible.builtin.fail:
        msg: "Missing required variable: avalanchego_version. Usage: ansible-playbook playbooks/shared/upgrade-nodes.yml -e avalanchego_version=1.14.2"
      when: avalanchego_version is not defined

    - name: Display upgrade plan
      ansible.builtin.debug:
        msg: |

          ============================================
          Avalanche Node Upgrade Plan
          ============================================

          Target avalanchego version: {{ avalanchego_version }}

          NOTE: subnet-evm is bundled with avalanchego and will be
                automatically updated from the release tarball.

          This will upgrade nodes one at a time using rolling restart.
          Release tarballs are SHA256-verified before install; nodes
          already on the target version are skipped. Each node will be
          verified healthy before proceeding to the next.

          ============================================

- name: Upgrade Validators (Rolling)
  hosts: validators
  become: true
  serial: 1
  gather_facts: true

  vars:
    health_retries: 60
    health_delay: 10

  tasks:
    - name: Display upgrade notice
      ansible.builtin.debug:
        msg: "Upgrading {{ inventory_hostname }} to avalanchego {{ avalanchego_version }}"

    - name: Install avalanchego binary and bundled subnet-evm (verified, idempotent)
      ansible.builtin.include_role:
        name: avalanchego
        tasks_from: install

    - name: Restart avalanchego now if the binary or plugin changed
      ansible.builtin.meta: flush_handlers

    - name: Wait for node to become healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/health"
        method: GET
        return_content: true
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: "{{ health_retries }}"
      delay: "{{ health_delay }}"

    - name: Verify P-Chain is bootstrapped
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.isBootstrapped"
          params:
            chain: "P"
        return_content: true
      register: p_chain_status
      until: p_chain_status.json.result.isBootstrapped | default(false)
      retries: "{{ health_retries }}"
      delay: "{{ health_delay }}"

    - name: Get running node version
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.getNodeVersion"
        return_content: true
      register: version_check

    - name: Assert node is running the target version
      vars:
        running_version: "{{ version_check.json.result.version | default('') | regex_search('[0-9]+\\.[0-9]+\\.[0-9]+') }}"
        target_version: "{{ avalanchego_version | string | regex_replace('^v', '') }}"
      ansible.builtin.assert:
        that:
          - running_version == target_version
        fail_msg: >-
          {{ inventory_hostname }} reports version
          {{ version_check.json.result.version | default('unknown') }}
          but {{ avalanchego_version }} was requested - the running process
          does not match the installed binary
        success_msg: "{{ inventory_hostname }} upgraded successfully - Version: {{ version_check.json.result.version }}"

