- name: Upgrade Summary
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display completion message
      ansible.builtin.debug:
        msg: |

          ============================================
          Upgrade Complete
          ============================================

          All nodes have been upgraded to avalanchego {{ avalanchego_version }}

          Release tarballs were SHA256-verified before install.
          subnet-evm was automatically updated from the bundled release.

          Run 'make health-checks' to verify cluster health.

          ============================================
