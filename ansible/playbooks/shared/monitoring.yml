---
# Phase 3: Setup Prometheus and Grafana monitoring
#
# Usage:
#   ansible-playbook playbooks/shared/monitoring.yml

- name: Install Node Exporter on all Avalanche nodes
  hosts: validators:rpc:primary_validators
  become: true
  gather_facts: true
  roles:
    - node_exporter

- name: Setup Monitoring Stack
  hosts: monitoring
  become: true
  gather_facts: true

  vars:
    prometheus_version: "2.54.1"
    grafana_version: "11.2.2"
    prometheus_port: 9090
    grafana_port: 3000

  roles:
    - prometheus
    - grafana

  post_tasks:
    - name: Display Grafana URL
      ansible.builtin.debug:
        msg: |
          Grafana available at: http://{{ ansible_host }}:{{ grafana_port }}

          Login: {{ grafana_admin_user }} / auto-generated password stored on the
          monitoring host at {{ grafana_admin_password_file }} (mode 0600).
          Retrieve it with:
            ssh ubuntu@{{ ansible_host }} sudo cat {{ grafana_admin_password_file }}
          To manage the credential externally, deploy with:
            -e grafana_admin_password=...
