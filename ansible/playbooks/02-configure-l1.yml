---
# Phase 2: Configure nodes to track and validate your L1
#
# Run this AFTER create-l1 tool has created your subnet/chain.
#
# Usage:
#   ansible-playbook playbooks/02-configure-l1.yml -e subnet_id=<SUBNET_ID>
#
# Or with chain config:
#   ansible-playbook playbooks/02-configure-l1.yml \
#     -e subnet_id=<SUBNET_ID> \
#     -e chain_id=<CHAIN_ID>

- name: Gather L1 Validator Info
  hosts: validators
  become: false
  gather_facts: false

  tasks:
    - name: Get NodeID from each validator
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.getNodeID"
        return_content: true
      register: node_id_result
      delegate_to: "{{ inventory_hostname }}"

    - name: Store NodeID as fact
      ansible.builtin.set_fact:
        node_id: "{{ node_id_result.json.result.nodeID }}"

- name: Configure Nodes for L1 (Phase 2)
  hosts: validators:rpc
  become: true
  gather_facts: true

  vars:
    subnet_id: "{{ subnet_id }}"  # Required - pass via -e
    chain_id: "{{ chain_id | default('') }}"  # Optional
    avalanchego_network: "{{ network | default('fuji') }}"
    avalanchego_config_dir: /etc/avalanchego
    avalanchego_data_dir: /var/lib/avalanchego
    avalanchego_log_dir: /var/log/avalanchego
    avalanchego_plugin_dir: "{{ avalanchego_data_dir }}/plugins"
    avalanchego_user: avalanche
    avalanchego_group: avalanche
    avalanchego_http_port: 9650
    avalanchego_staking_port: 9651
    avalanchego_api_admin_enabled: false
    avalanchego_api_info_enabled: true
    avalanchego_api_health_enabled: true
    avalanchego_log_level: info
    avalanchego_log_display_level: info
    avalanchego_partial_sync_primary_network: true
    avalanchego_network_ids:
      fuji: 5
      mainnet: 1
    # Determine node type from inventory group
    avalanchego_node_type: "{{ 'rpc' if 'rpc' in group_names else 'validator' }}"
    avalanchego_index_enabled: "{{ true if avalanchego_node_type == 'rpc' else false }}"

  pre_tasks:
    - name: Validate subnet_id is provided
      ansible.builtin.fail:
        msg: "subnet_id is required. Run with: -e subnet_id=<YOUR_SUBNET_ID>"
      when: subnet_id is not defined or subnet_id == ""

    - name: Build L1 bootstrap lists
      ansible.builtin.set_fact:
        l1_bootstrap_ids: "{{ groups['validators'] | map('extract', hostvars, 'node_id') | list }}"
        l1_bootstrap_ips: "{{ groups['validators'] | map('extract', hostvars, 'ansible_host') | map('regex_replace', '$', ':9651') | list }}"

  tasks:
    - name: Load custom node config from repository config directory
      ansible.builtin.set_fact:
        avalanchego_custom_node_config: >-
          {{
            lookup('file', playbook_dir + '/../../configs/l1/node/' + avalanchego_node_type + '-node-config.json')
            | from_json
          }}
      failed_when: false

    - name: Build base node configuration
      ansible.builtin.set_fact:
        avalanchego_base_node_config:
          network-id: "{{ avalanchego_network_ids[avalanchego_network] }}"
          http-host: "0.0.0.0"
          http-port: "{{ avalanchego_http_port }}"
          staking-port: "{{ avalanchego_staking_port }}"
          http-allowed-hosts: "*"
          api-admin-enabled: "{{ avalanchego_api_admin_enabled }}"
          api-info-enabled: "{{ avalanchego_api_info_enabled }}"
          api-health-enabled: "{{ avalanchego_api_health_enabled }}"
          index-enabled: "{{ avalanchego_index_enabled }}"
          log-level: "{{ avalanchego_log_level }}"
          log-display-level: "{{ avalanchego_log_display_level }}"
          log-dir: "{{ avalanchego_log_dir }}"
          db-dir: "{{ avalanchego_data_dir }}/db"
          plugin-dir: "{{ avalanchego_plugin_dir }}"
          chain-config-dir: "{{ avalanchego_config_dir }}/chains"
          partial-sync-primary-network: "{{ avalanchego_partial_sync_primary_network }}"
          track-subnets: "{{ subnet_id }}"

    - name: Add L1 bootstrap info to config
      vars:
        bootstrap_config:
          bootstrap-ids: "{{ l1_bootstrap_ids | join(',') }}"
          bootstrap-ips: "{{ l1_bootstrap_ips | join(',') }}"
      ansible.builtin.set_fact:
        avalanchego_base_node_config: "{{ avalanchego_base_node_config | combine(bootstrap_config) }}"
      when: l1_bootstrap_ids is defined and l1_bootstrap_ids | length > 0

    - name: Merge custom config with base config
      ansible.builtin.set_fact:
        avalanchego_final_node_config: "{{ avalanchego_base_node_config | combine(avalanchego_custom_node_config | default({})) }}"

    - name: Write node configuration
      ansible.builtin.copy:
        content: "{{ avalanchego_final_node_config | to_nice_json }}"
        dest: "{{ avalanchego_config_dir }}/node.json"
        owner: "{{ avalanchego_user }}"
        group: "{{ avalanchego_group }}"
        mode: "0644"
      notify: Restart avalanchego

    - name: Create chain config directory for L1
      ansible.builtin.file:
        path: "{{ avalanchego_config_dir }}/chains/{{ chain_id }}"
        state: directory
        owner: "{{ avalanchego_user }}"
        group: "{{ avalanchego_group }}"
        mode: "0755"
      when: chain_id != ""

    - name: Determine chain config file for RPC nodes
      ansible.builtin.set_fact:
        chain_config_file: >-
          {%- if avalanchego_node_type == 'rpc' and rpc_type is defined -%}
            rpc-{{ rpc_type }}-chain-config.json
          {%- else -%}
            {{ avalanchego_node_type }}-chain-config.json
          {%- endif -%}
      when: chain_id != ""

    - name: Check if specific chain config exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../configs/l1/chain/{{ chain_config_file | trim }}"
      register: specific_config
      delegate_to: localhost
      become: false
      when: chain_id != ""

    - name: Fallback to generic node type config if specific doesn't exist
      ansible.builtin.set_fact:
        chain_config_file: "{{ avalanchego_node_type }}-chain-config.json"
      when: chain_id != "" and specific_config.stat is defined and not specific_config.stat.exists

    - name: Copy chain config (validator or RPC specific)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../configs/l1/chain/{{ chain_config_file | trim }}"
        dest: "{{ avalanchego_config_dir }}/chains/{{ chain_id }}/config.json"
        owner: "{{ avalanchego_user }}"
        group: "{{ avalanchego_group }}"
        mode: "0644"
      when: chain_id != ""
      notify: Restart avalanchego

  handlers:
    - name: Restart avalanchego
      ansible.builtin.systemd:
        name: avalanchego
        state: restarted

  post_tasks:
    - name: Wait for node to restart
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.getNodeID"
        return_content: true
      register: node_check
      until: node_check.status == 200
      retries: 30
      delay: 5

    - name: Wait for L1 chain to be ready
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/bc/{{ chain_id }}/rpc"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "eth_chainId"
          params: []
        return_content: true
      register: l1_check
      until: l1_check.status == 200
      retries: 30
      delay: 5
      when: chain_id != ""
      failed_when: false

    - name: Display status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} is now tracking subnet {{ subnet_id }}{% if chain_id != '' %} (L1 chain ready){% endif %}"

- name: Display completion message
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Show L1 info
      ansible.builtin.debug:
        msg: |

          ============================================
          Phase 2 Complete - L1 Configured
          ============================================

          Subnet ID: {{ subnet_id }}
          {% if chain_id is defined and chain_id != '' %}
          Chain ID:  {{ chain_id }}
          {% endif %}

          Your L1 validators are now running!

          Bootstrap IDs configured for validator discovery.

          RPC Endpoints:
          {% for host in groups['rpc'] | default([]) %}
            http://{{ hostvars[host]['ansible_host'] }}:9650/ext/bc/{{ chain_id }}/rpc (RPC node - recommended)
          {% endfor %}
          {% for host in groups['validators'] | default([]) %}
            http://{{ hostvars[host]['ansible_host'] }}:9650/ext/bc/{{ chain_id }}/rpc (validator - SSH tunnel only)
          {% endfor %}

          ============================================
