---
# Main playbook - deploys complete Avalanche L1 infrastructure
#
# Usage:
#   ansible-playbook playbooks/site.yml
#
# Or run individual plays:
#   ansible-playbook playbooks/deploy-validators.yml
#   ansible-playbook playbooks/deploy-rpc.yml
#   ansible-playbook playbooks/setup-monitoring.yml

- name: Deploy Avalanche L1 Infrastructure
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Wait for system to become reachable
      wait_for_connection:
        timeout: 300

    - name: Gather facts
      setup:

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

- import_playbook: deploy-validators.yml
- import_playbook: deploy-rpc.yml
- import_playbook: setup-monitoring.yml
