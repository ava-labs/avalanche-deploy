---
# Health Checks Playbook
#
# Performs comprehensive health checks on all Avalanche nodes.
# Returns structured data about node status, sync progress, and L1 chain health.
#
# Usage:
#   ansible-playbook playbooks/health-checks.yml
#   ansible-playbook playbooks/health-checks.yml -e chain_id=xxx
#
# Variables:
#   chain_id: L1 chain ID to check (optional, will try to read from l1.env)

- name: Health Checks - Gather Node Information
  hosts: validators:rpc:primary_validators
  become: false
  gather_facts: false

  vars:
    l1_chain_id: "{{ chain_id | default('') }}"

  tasks:
    - name: Check avalanchego service status
      ansible.builtin.systemd:
        name: avalanchego
      register: service_status
      become: true
      failed_when: false

    - name: Get node ID
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.getNodeID"
        return_content: true
        timeout: 10
      register: node_id_response
      failed_when: false

    - name: Get node version
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.getNodeVersion"
        return_content: true
        timeout: 10
      register: node_version_response
      failed_when: false

    - name: Check P-Chain bootstrap status
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.isBootstrapped"
          params:
            chain: "P"
        return_content: true
        timeout: 10
      register: p_chain_status
      failed_when: false

    - name: Check C-Chain bootstrap status
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.isBootstrapped"
          params:
            chain: "C"
        return_content: true
        timeout: 10
      register: c_chain_status
      failed_when: false

    - name: Check X-Chain bootstrap status
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/info"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "info.isBootstrapped"
          params:
            chain: "X"
        return_content: true
        timeout: 10
      register: x_chain_status
      failed_when: false

    - name: Get health status
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/health"
        method: GET
        return_content: true
        timeout: 10
      register: health_response
      failed_when: false

    - name: Check L1 chain RPC (if chain_id provided)
      ansible.builtin.uri:
        url: "http://127.0.0.1:9650/ext/bc/{{ l1_chain_id }}/rpc"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          id: 1
          method: "eth_blockNumber"
          params: []
        return_content: true
        timeout: 10
      register: l1_block_response
      when: l1_chain_id != ''
      failed_when: false

    - name: Set node health facts
      ansible.builtin.set_fact:
        node_health:
          hostname: "{{ inventory_hostname }}"
          ip: "{{ ansible_host }}"
          service_running: "{{ service_status.status.ActiveState | default('unknown') == 'active' }}"
          node_id: "{{ node_id_response.json.result.nodeID | default('unknown') }}"
          version: "{{ node_version_response.json.result.version | default('unknown') }}"
          p_chain_bootstrapped: "{{ p_chain_status.json.result.isBootstrapped | default(false) }}"
          c_chain_bootstrapped: "{{ c_chain_status.json.result.isBootstrapped | default(false) }}"
          x_chain_bootstrapped: "{{ x_chain_status.json.result.isBootstrapped | default(false) }}"
          health_check_passed: "{{ health_response.status | default(0) == 200 }}"
          l1_block_number: "{{ l1_block_response.json.result | default('N/A') if l1_chain_id != '' else 'N/A' }}"

- name: Health Checks - Display Results
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Collect all node health data
      ansible.builtin.set_fact:
        all_nodes_health: "{{ groups['validators'] | default([]) | union(groups['rpc'] | default([])) | union(groups['primary_validators'] | default([])) | map('extract', hostvars, 'node_health') | list }}"

    - name: Display validator health
      ansible.builtin.debug:
        msg: |

          ============================================
          Validator Health Status
          ============================================
          {% for node in all_nodes_health %}
          {% if node.hostname in groups.get('validators', []) %}

          {{ node.hostname }} ({{ node.ip }}):
            Service:     {{ 'RUNNING' if node.service_running else 'STOPPED' }}
            NodeID:      {{ node.node_id }}
            Version:     {{ node.version }}
            P-Chain:     {{ 'READY' if node.p_chain_bootstrapped else 'SYNCING' }}
            C-Chain:     {{ 'READY' if node.c_chain_bootstrapped else 'SYNCING' }}
            X-Chain:     {{ 'READY' if node.x_chain_bootstrapped else 'SYNCING' }}
            Health:      {{ 'HEALTHY' if node.health_check_passed else 'UNHEALTHY' }}
            L1 Block:    {{ node.l1_block_number }}
          {% endif %}
          {% endfor %}

    - name: Display RPC health
      ansible.builtin.debug:
        msg: |

          ============================================
          RPC Node Health Status
          ============================================
          {% for node in all_nodes_health %}
          {% if node.hostname in groups.get('rpc', []) %}

          {{ node.hostname }} ({{ node.ip }}):
            Service:     {{ 'RUNNING' if node.service_running else 'STOPPED' }}
            NodeID:      {{ node.node_id }}
            Version:     {{ node.version }}
            P-Chain:     {{ 'READY' if node.p_chain_bootstrapped else 'SYNCING' }}
            C-Chain:     {{ 'READY' if node.c_chain_bootstrapped else 'SYNCING' }}
            X-Chain:     {{ 'READY' if node.x_chain_bootstrapped else 'SYNCING' }}
            Health:      {{ 'HEALTHY' if node.health_check_passed else 'UNHEALTHY' }}
            L1 Block:    {{ node.l1_block_number }}
          {% endif %}
          {% endfor %}

    - name: Display primary validator health
      ansible.builtin.debug:
        msg: |

          ============================================
          Primary Validator Health Status
          ============================================
          {% for node in all_nodes_health %}
          {% if node.hostname in groups.get('primary_validators', []) %}

          {{ node.hostname }} ({{ node.ip }}):
            Service:     {{ 'RUNNING' if node.service_running else 'STOPPED' }}
            NodeID:      {{ node.node_id }}
            Version:     {{ node.version }}
            P-Chain:     {{ 'READY' if node.p_chain_bootstrapped else 'SYNCING' }}
            C-Chain:     {{ 'READY' if node.c_chain_bootstrapped else 'SYNCING' }}
            X-Chain:     {{ 'READY' if node.x_chain_bootstrapped else 'SYNCING' }}
            Health:      {{ 'HEALTHY' if node.health_check_passed else 'UNHEALTHY' }}
            L1 Block:    {{ node.l1_block_number }}
          {% endif %}
          {% endfor %}

    - name: Calculate summary statistics
      ansible.builtin.set_fact:
        total_nodes: "{{ all_nodes_health | length }}"
        healthy_nodes: "{{ all_nodes_health | selectattr('health_check_passed') | list | length }}"
        bootstrapped_nodes: "{{ all_nodes_health | selectattr('p_chain_bootstrapped') | list | length }}"

    - name: Display summary
      ansible.builtin.debug:
        msg: |

          ============================================
          Summary
          ============================================

          Total Nodes:       {{ total_nodes }}
          Healthy:           {{ healthy_nodes }}/{{ total_nodes }}
          P-Chain Ready:     {{ bootstrapped_nodes }}/{{ total_nodes }}

          {% if healthy_nodes == total_nodes and bootstrapped_nodes == total_nodes %}
          Status: ALL SYSTEMS OPERATIONAL
          {% elif healthy_nodes == total_nodes %}
          Status: HEALTHY (some nodes still syncing)
          {% else %}
          Status: DEGRADED ({{ total_nodes | int - healthy_nodes | int }} unhealthy nodes)
          {% endif %}

          ============================================
